<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ディスクロージャー管理システム v23.3</title>
<style>
:root{
  --lh-cbs:1.8;--lh-cpl:1.8;--lh-ccf:1.8;--lh-ceq:1.8;
  --lh-bs:1.8;--lh-pl:1.8;--lh-cf:1.8;--lh-eq:1.8;
  --lh-br:1.8;--lh-cnote:1.8;--lh-note:1.8;
  --lh-compc:1.8;--lh-comps:1.8;
  --lh-encbs:1.8;--lh-encpl:1.8;--lh-enccf:1.8;--lh-enceq:1.8;
  --lh-enbs2:1.8;--lh-enpl2:1.8;--lh-encf2:1.8;--lh-eneq2:1.8;--lh-enbr:1.8;
  --fs-cbs:14px;--fs-cpl:14px;--fs-ccf:14px;--fs-ceq:11px;
  --fs-bs:14px;--fs-pl:14px;--fs-cf:14px;--fs-eq:11px;
  --fs-br:14px;--fs-cnote:14px;--fs-note:14px;
  --fs-compc:14px;--fs-comps:14px;
  --fs-encbs:14px;--fs-encpl:14px;--fs-enccf:14px;--fs-enceq:11px;
  --fs-enbs2:14px;--fs-enpl2:14px;--fs-encf2:14px;--fs-eneq2:11px;--fs-enbr:14px;
  --lh-fs:1.8;--pd-fs:3px 12px;
  --font-body:"Yu Mincho","Hiragino Mincho ProN","MS Mincho",serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:"Yu Gothic UI","Hiragino Kaku Gothic ProN","Meiryo",sans-serif;font-size:14px;color:#1a1a1a;background:#f4f4f6}
input,textarea,select,button{font-family:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#f0f0f0}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
input:focus,textarea:focus,select:focus{outline:2px solid #3d5499;outline-offset:1px}

/* ── LAYOUT ── */
#shell{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#topbar{height:52px;background:#1a2744;display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.35);z-index:100}
#topbar-title{color:#fff;font-size:12px;font-weight:600;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#topbar-title span{color:#c9a84c}
#topbar-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.mode-tog{display:flex;background:rgba(255,255,255,.1);border-radius:5px;padding:2px}
.mode-btn{padding:4px 12px;border:none;border-radius:3px;cursor:pointer;font-size:11px;font-weight:600;background:transparent;color:rgba(255,255,255,.6);transition:all .15s}
.mode-btn.active{background:#fff;color:#1a2744}
#btn-save{padding:5px 13px;background:#27ae60;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:700}
#btn-save:hover{background:#2ecc71}
#btn-pdf{padding:5px 14px;background:#c9a84c;color:#1a2744;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:700}

#body{display:flex;flex:1;overflow:hidden}
#sidebar{width:230px;background:#1a2744;flex-shrink:0;overflow-y:auto;padding:8px 0}
.sb-group{font-size:11px;color:rgba(255,255,255,.5);padding:16px 16px 5px;letter-spacing:.06em;font-weight:700}
.sb-expand{cursor:pointer;user-select:none;font-size:13px;color:rgba(255,255,255,.9);padding:14px 16px 6px;letter-spacing:.04em;font-weight:700}
.sb-expand:hover{background:rgba(255,255,255,.08);color:#fff}
.sb-sub{font-size:10px;color:#8bb8e8;padding:12px 16px 4px 22px;letter-spacing:.05em;font-weight:700;border-top:1px solid rgba(255,255,255,.08);margin-top:2px}
.sb-item{padding:8px 16px 8px 28px;cursor:pointer;font-size:13.5px;font-weight:500;border-left:3px solid transparent;color:rgba(255,255,255,.78);display:flex;align-items:center;gap:8px;transition:all .12s;line-height:1.35}
.sb-item:hover{background:rgba(255,255,255,.1);color:#fff}
.sb-item.active{border-left-color:#c9a84c;background:rgba(201,168,76,.18);color:#f0d88a;font-weight:700}
#content{flex:1;overflow-y:auto;padding:28px;background:#f4f4f6}
#content.pv{padding:0;background:#ece6d8}

/* ── FORM ── */
.fw{max-width:660px}
.sec-h2{font-family:"Yu Mincho","Hiragino Mincho ProN","MS Mincho",serif;font-size:17px;color:#1a2744;margin-bottom:20px;padding-bottom:8px;border-bottom:2px solid #3d5499}
.sec-h3{font-size:10px;font-weight:700;color:#3d5499;margin:16px 0 8px;letter-spacing:.08em;text-transform:uppercase}
.fld{margin-bottom:9px}
.fld label{display:block;font-size:11px;color:#666;margin-bottom:3px;font-weight:500}
.fld-row{display:flex;align-items:center;gap:6px}
.fld input{padding:5px 9px;border:1px solid #dde0e8;border-radius:4px;font-size:13px;background:#fff}
.fld input.n{text-align:right}
.fld-u{font-size:11px;color:#888}
.fld textarea{width:100%;padding:7px 10px;border:1px solid #dde0e8;border-radius:4px;font-size:12px;line-height:1.7;resize:vertical}
.cbox{background:#f8f5ee;border:1px solid #e8e0cc;border-radius:6px;padding:12px;margin-top:14px}
.cbox p{font-size:12px;color:#555;margin-bottom:4px}
.cbox p strong{color:#1a2744}
.info-box{background:#e8f0ff;padding:7px 11px;border-radius:4px;font-size:11px;color:#3d5499;margin-bottom:14px}
.auto-note{font-size:11px;color:#888;margin:3px 0 10px;padding:5px 10px;background:#f5f5f5;border-radius:4px}

/* ── TABLES ── */
.ft{width:100%;border-collapse:collapse}
.ft th{background:#1a2744;color:#fff;padding:6px 12px;font-size:inherit;font-weight:600;font-family:"Yu Gothic UI",sans-serif}
.ft td{padding:var(--pd-fs);border-bottom:1px solid #eee;font-size:inherit;line-height:inherit}
/* 財務諸表専用テーブル */
.ft-fin th{background:#1a2744;color:#fff;padding:5px 12px;font-size:inherit;font-weight:600;font-family:"Yu Gothic UI",sans-serif}
.ft-fin td{padding:var(--pd-fs);border-bottom:1px solid #eee;font-size:inherit;line-height:inherit}
.ft-fin,.ft{width:100%;border-collapse:collapse}
.ft-fin .r,.ft .r{text-align:right;font-variant-numeric:tabular-nums}
.ft-fin .b,.ft .b{font-weight:700}
.ft-fin .bt,.ft .bt{border-top:2px solid #1a2744}
.ft-fin .bb,.ft .bb{border-bottom:2px solid #1a2744}
.ft-fin .i1,.ft .i1{padding-left:24px}
.ft-fin .i2,.ft .i2{padding-left:38px}

/* Compact table for 1-page sheets */
.ft-sm td{padding:3px 11px;font-size:13px}
.ft-sm th{padding:7px 11px;font-size:12px}

/* ── ACCOUNTS MASTER ── */
.acc-t{border-collapse:collapse;min-width:520px;font-size:12px}
.acc-t th{background:#1a2744;color:#fff;padding:7px 10px;text-align:left}
.acc-t td{padding:3px 5px;border-bottom:1px solid #eee;background:#fff}
.ai{padding:3px 6px;border:1px solid #ddd;border-radius:3px;font-size:12px;font-family:inherit}
.btn-add{padding:5px 12px;background:#1a2744;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px}
.btn-sm{padding:4px 10px;border:none;border-radius:3px;cursor:pointer;font-size:11px;color:#fff}
.btn-exp{background:#27ae60}
.btn-imp{background:#3d5499}
.btn-del{background:#c0392b}

/* ── ATTACHMENTS / REPORTS ── */
.rpt-card{border:1px solid #e0e0e8;border-radius:8px;padding:18px;background:#fff;margin-bottom:14px}
.rpt-btns{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.rpt-btn{padding:7px 14px;border:none;border-radius:4px;cursor:pointer;font-size:12px;color:#fff;font-weight:500}

/* ── DOC ORDER ── */
.order-list{max-width:520px}
.order-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#fff;border:1px solid #dde0e8;border-radius:6px;margin-bottom:8px;cursor:grab;user-select:none;transition:box-shadow .15s}
.order-item:active{cursor:grabbing}
.order-item.dnd-over{outline:2px solid #c9a84c;background:#fffbe8}
.order-item.dnd-drag{opacity:.4}
.drag-handle{color:#bbb;font-size:18px;line-height:1}
.acc-row-selected{outline:2px solid #c9a84c;outline-offset:-2px}
.acc-row-drop{box-shadow:inset 0 -3px 0 #3d5499}
.acc-dragging{opacity:.45}
.order-num{width:22px;height:22px;background:#3d5499;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.order-label{font-size:13px;font-weight:500}
.order-icon{font-size:16px}

/* ── DATA MANAGE ── */
.dm-card{border-radius:8px;padding:18px;margin-bottom:14px}
.dm-btn{padding:7px 18px;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600}

/* ── PREVIEW ── */
.doc-page{background:#fff;max-width:800px;margin:0 auto 28px;padding:48px 58px;box-shadow:0 2px 12px rgba(0,0,0,.08);font-family:var(--font-body);overflow-wrap:break-word;word-wrap:break-word}
.doc-page-compact{padding:28px 58px;page-break-inside:avoid}
.doc-page-flow{background:#fff;max-width:800px;margin:0 auto 28px;padding:48px 58px;box-shadow:0 2px 12px rgba(0,0,0,.08);font-family:var(--font-body);overflow-wrap:break-word;word-wrap:break-word}
/* 財務諸表専用: 高さ固定・自動フィット対象 */
.doc-page-fin{height:1123px;padding:34px 58px;transform-origin:top left}
.doc-page-landscape.doc-page-fin{height:794px}
.dp{font-size:13px;color:#555;margin-bottom:10px;font-family:"Yu Gothic UI",sans-serif}
.dt{font-size:22px;font-weight:700;color:#1a2744;text-align:center;margin-bottom:6px}
.dt-sm{font-size:18px}
.ds-fin{display:flex;justify-content:center;align-items:baseline;margin-bottom:8px;position:relative;font-family:"Yu Gothic UI",sans-serif}
.ds-period{font-size:13px;color:#555}
.ds-unit{font-size:11px;color:#666;position:absolute;right:0}
.ds{font-size:13px;color:#555;text-align:center;margin-bottom:10px;font-family:"Yu Gothic UI",sans-serif}
.dn{font-size:12px;color:#aaa;text-align:right;margin-top:8px;font-family:"Yu Gothic UI",sans-serif}
.bs-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:end}
.sh{font-size:inherit;font-weight:700;color:#1a2744;border-bottom:1px solid #ccc;padding-bottom:5px;margin-bottom:8px;margin-top:14px;font-family:var(--font-body)}
.nh{font-size:inherit;font-weight:700;color:#1a2744;margin-bottom:4px;margin-top:10px}
.br-text{font-size:var(--fs-br);line-height:var(--lh-br);white-space:pre-wrap;font-family:var(--font-body);overflow-wrap:break-word;word-wrap:break-word;text-align:justify;text-justify:inter-ideograph}
.pl-eq-divider{border:none;border-top:2px solid #c9a84c;margin:22px 0 18px}
.rpt-content{font-size:var(--fs-br);line-height:var(--lh-br);font-family:var(--font-body);white-space:pre-wrap}
.sig-table{margin-left:auto;line-height:2.4;font-size:14px}

/* ── COVER ── */
.cover-period{font-size:16px;color:#3d5499;text-align:center;letter-spacing:.06em;font-family:"Yu Gothic UI",sans-serif}
.cover-title{font-size:40px;font-weight:700;color:#1a2744;letter-spacing:.16em;padding-bottom:22px;border-bottom:3px solid #c9a84c;display:block;text-align:center;line-height:1.4}
.cover-name{font-size:28px;font-weight:700;color:#1a2744;text-align:center}


/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a2744;color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.3);z-index:9999;pointer-events:none;display:none}

/* ── A4 PREVIEW FRAME ── */
.a4-frame{position:relative;width:794px;height:1123px;margin:0 auto 48px;overflow:hidden;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.a4-frame.a4-landscape{width:1123px;height:794px}
.a4-frame .doc-page{width:794px;max-width:794px;margin:0;transform-origin:top left;overflow:hidden;word-wrap:break-word;overflow-wrap:break-word;box-shadow:none;box-sizing:border-box}
/* 書式設定のfont-size/line-heightをページ全体に強制適用（タイトル・期・期間は除外） */
.a4-frame td,.a4-frame .br-text,.a4-frame .rpt-content,.a4-frame .sh,.a4-frame .nh{font-size:inherit!important;line-height:inherit!important}
.a4-frame .doc-page-landscape{width:1123px;max-width:1123px;min-height:794px;margin:0;transform-origin:top left;overflow:hidden;word-wrap:break-word;overflow-wrap:break-word;box-shadow:none;box-sizing:border-box}
.a4-frame .doc-page-compact{width:794px;max-width:794px;margin:0;transform-origin:top left;overflow:hidden;word-wrap:break-word;overflow-wrap:break-word;box-shadow:none;box-sizing:border-box}
.a4-frame .doc-page-flow{width:794px;max-width:794px;margin:0;transform-origin:top left;overflow:hidden;word-wrap:break-word;overflow-wrap:break-word;box-shadow:none;box-sizing:border-box}
.a4-flow .a4-boundary{display:none}
.pvb-fit-page{position:absolute;top:6px;right:60px;z-index:10;background:#3d5499;color:#fff;border:none;border-radius:4px;padding:3px 8px;cursor:pointer;font-size:11px;opacity:.6;transition:opacity .15s}
.pvb-fit-page:hover{opacity:1}
.a4-boundary{position:absolute;left:0;right:0;top:1123px;pointer-events:none;z-index:20}
.a4-boundary-line{border-top:2px dashed rgba(220,60,60,.65);display:flex;align-items:center;padding:3px 8px 0;font-size:9px;color:rgba(220,60,60,.8);font-family:monospace;background:rgba(220,60,60,.04)}
.a4-overflow-area{background:rgba(220,60,60,.03);border:1px solid rgba(220,60,60,.15);padding:4px 8px;min-height:8px}
.a4-overflow-badge{background:#e74c3c;color:#fff;font-size:8px;padding:1px 6px;border-radius:3px;margin-left:6px}
.a4-pg-num{position:absolute;top:-20px;right:2px;font-size:9px;color:#aaa;font-family:monospace}
.a4-pg-size{position:absolute;top:-20px;left:2px;font-size:9px;color:#bbb;font-family:monospace}
.a4-fit-badge{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:9px;color:#27ae60;font-family:monospace;font-weight:600;display:none}
.a4-frame.fitted .a4-fit-badge{display:block}


/* ── DATA LOCK ── */
#lock-btn{padding:5px 13px;border:1px solid rgba(255,255,255,.3);border-radius:4px;cursor:pointer;font-size:11px;font-weight:700;background:transparent;color:rgba(255,255,255,.7);transition:all .2s}
#lock-btn.locked{background:#e74c3c;border-color:#e74c3c;color:#fff}
#lock-badge{display:none;background:#e74c3c;color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:3px;letter-spacing:.04em}
#lock-badge.visible{display:inline-block}
.locked-overlay{pointer-events:none;opacity:.5;user-select:none}
/* 事業報告チェック行 */
.br-item{border:1px solid #e8eaf0;border-radius:6px;padding:12px 14px;margin-bottom:12px;background:#fff;position:relative}
.br-item.hidden-item{background:#f7f7f7;border-style:dashed;opacity:.6}
.br-item-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.br-vis-chk{width:15px;height:15px;cursor:pointer;flex-shrink:0}
.br-title-inp{flex:1;padding:4px 8px;border:1px solid #dde0e8;border-radius:4px;font-size:12px;font-weight:600;color:#1a2744;background:#f8f9ff}
.br-sub-label{font-size:10px;color:#999;white-space:nowrap}


/* ── PURPOSE BAR ── */
#purpose-bar{height:40px;background:#131f3a;display:flex;align-items:stretch;padding:0 14px;gap:2px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
.ptyp{padding:0 16px;border:none;cursor:pointer;font-size:11px;font-weight:600;color:rgba(255,255,255,.5);background:transparent;letter-spacing:.03em;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap}
.ptyp:hover{color:rgba(255,255,255,.8)}
.ptyp.active{color:#fff;border-bottom-color:#c9a84c}
.ptyp-icon{margin-right:5px;font-size:12px}
#purpose-label{margin-left:auto;display:flex;align-items:center;font-size:10px;color:rgba(255,255,255,.3);padding-right:4px}

/* ── PREVIEW TOOLBAR ── */
.pv-bar{position:sticky;top:0;z-index:50;background:#1b2d52ee;backdrop-filter:blur(6px);
  padding:7px 16px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;
  border-bottom:1px solid rgba(255,255,255,.08)}
.pvb{padding:5px 11px;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;color:#fff;white-space:nowrap}
.pvb:hover{opacity:.82}
.pvb-green{background:#27ae60}
.pvb-reset{background:#555}
.pvb-gold{background:#c9a84c;color:#1a2744}
.pvb-blue{background:#3d5499}
.pv-sep{width:1px;height:22px;background:rgba(255,255,255,.15);margin:0 4px}
.pv-info{font-size:10px;color:rgba(255,255,255,.4);white-space:nowrap}


/* ── LIBRARY / DOC-ORDER PANEL ── */
.lib-section-head{font-size:10px;font-weight:700;color:#3d5499;margin-bottom:6px;letter-spacing:.07em;text-transform:uppercase}
.lib-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:4px;margin-bottom:3px;background:#f8f8f8;border:1px solid #eee;cursor:grab;transition:background .1s}
.lib-item:hover{background:#eef2ff}
.lib-item.lib-in{background:#eef6ff;border-color:#b0cff5}
.lib-item.lib-extra{border-style:dashed;border-color:#f0c080;background:#fffbe8}
.lib-item.lib-extra.lib-in{background:#fff3d0;border-color:#c9a84c;border-style:solid}
.lib-item.dnd-drag{opacity:.35}
.lib-btn{padding:2px 7px;border:none;border-radius:3px;cursor:pointer;font-size:10px;color:#fff;flex-shrink:0;background:#888}
.lib-btn-green{background:#27ae60}
.lib-btn-red{background:#e74c3c}
.lib-btn-blue{background:#3d5499}
#order-dropzone.dz-active{border-color:#c9a84c!important;background:#fffbe8}

/* ── PRINT ── */
@page{size:A4 portrait;margin:0}
@page landscape_page{size:A4 landscape;margin:0}
.doc-page-landscape{background:#fff;max-width:1123px;margin:0 auto 28px;padding:36px 58px;box-shadow:0 2px 12px rgba(0,0,0,.08);font-family:"Yu Mincho","Hiragino Mincho ProN","MS Mincho",serif;page:landscape_page}
@media print{
  @page{size:A4 portrait;margin:0}
  html,body{background:white!important;margin:0!important;padding:0!important}
  #topbar,#sidebar,#toast,.pv-bar,.a4-boundary,.a4-pg-num,.a4-pg-size,#purpose-bar{display:none!important}
  #shell{height:auto!important;display:block!important}
  #body{display:block!important}
  #content,#content.pv{overflow:visible!important;padding:0!important;background:white!important}
  #pv-pages{padding:0!important;margin:0!important}
  .a4-frame{width:210mm!important;height:296.5mm!important;margin:0!important;padding:0!important;background:white!important;page-break-after:always!important;overflow:hidden!important;box-shadow:none!important}
  .a4-frame.a4-landscape{width:297mm!important;height:209.5mm!important}
  .a4-frame:last-child{page-break-after:auto!important}
  .doc-page,.doc-page-compact,.doc-page-flow,.doc-page-fin{
    background:white!important;box-shadow:none!important;margin:0!important;
  }
  .doc-page-cover{padding:0!important;height:296.5mm!important;margin:0!important;display:flex!important;align-items:center!important;justify-content:center!important}
}
</style>
</head>
<body>
<script id="saved-data" type="application/json"></script>
<div id="shell">
  <div id="topbar">
    <div id="topbar-title"><span>▐</span> ディスクロージャー管理システム</div>
    <div id="topbar-actions">
      <span id="lock-badge">🔒 データクローズ中</span>
      <div class="mode-tog">
        <button class="mode-btn" id="btn-edit" onclick="setMode('edit')">✏️ 編集</button>
        <button class="mode-btn" id="btn-prev" onclick="setMode('preview')">👁 プレビュー</button>
      </div>
      <button id="lock-btn" onclick="toggleLock()" title="データクローズ（編集ロック）">🔓 クローズ</button>
      <button id="btn-apply" onclick="applyAll()" title="入力値を計算に反映（ファイル保存なし）" style="padding:5px 13px;background:#3d5499;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:700">🔄 反映</button>

// ── 汎用 FS 計算エンジン ──────────────────────────────────────
// accounts を上から処理し、各 type に応じて値を計算
// 戻り値: { [id]: value, ... } の計算済みマップ
function computeFS(d){
  const vals={};
  const v=id=>{
    const raw=d[id]||d[String(id)]||'';
    return num(raw);
  };

  // ▼ v12.3: stmt別のcatSums事前計算（subtotal行がないcatのst_XXXをformula用に生成）
  // 例: PLのst_REV, st_COGSはsubtotal行がないがcalc_GPのformulaで参照される
  const catSums={};
  for(const a of S.accounts){
    if(a.type==='item'&&a.cat&&a.stmt){
      const key=a.stmt+'|'+a.cat;
      catSums[key]=(catSums[key]||0)+(a.deduct?-v(a.id):v(a.id));
    }
  }
  for(const [key,sum] of Object.entries(catSums)){
    const cat=key.split('|')[1];
    if(vals['st_'+cat]===undefined) vals['st_'+cat]=sum;
  }

  for(const a of S.accounts){
    const sid=String(a.id);
    switch(a.type){
      case 'item':
        vals[sid]= a.deduct ? -v(a.id) : v(a.id);
        break;
      case 'subtotal':
        // 同じ stmt かつ同じ cat の item を合計（catSumsを上書き）
        vals[sid]=S.accounts
          .filter(x=>x.type==='item'&&x.cat===a.cat&&x.stmt===a.stmt)
          .reduce((s,x)=>{
            const xv= x.deduct ? -v(x.id) : v(x.id);
            return s+xv;
          },0);
        break;
      case 'total':
        vals[sid]=(a.sumOf||[]).reduce((s,ref)=>{
          return s+(vals[String(ref)]||0);
        },0);
        break;
      case 'calc':{
        let f=a.formula;
        if(!f){vals[sid]=0;break;}
        const localVals={...vals, taxRate: parseFloat(d.taxRate||30)/100};
        const sortedIds=[...Object.keys(localVals)].sort((a,b)=>b.length-a.length);
        for(const k of sortedIds){
          const re=new RegExp(k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'(?![\\w])','g');
          f=f.replace(re, `V["${k}"]`);
        }
        try{
          f=f.replace(/ROUND\(([^,]+),(\d+)\)/g,'(Math.round(($1)*Math.pow(10,$2))/Math.pow(10,$2))');
          vals[sid]=new Function('V','return ('+f+')')(localVals);
        }catch{vals[sid]=0;}
        break;
      }
      default: vals[sid]=0;
    }
  }
  return vals;
}

function calcBS(d,stKey){
  const m=computeFS(d);
  const g=id=>m[String(id)]||0;
  // v12.1: CBS/BS明示的切替（||フォールバック廃止）
  const isC=(stKey==='cbs'||stKey==='prev_cbs');
  const p=isC?'CBS_':'';
  return {
    map:m,
    bsCA: g('st_'+p+'CA'), bsFA: g('st_'+p+'FA'), bsDeferred: g('st_'+p+'DEF'),
    bsTA: g(isC?'tot_CBS_A':'tot_A'),
    bsCL: g('st_'+p+'CL'), bsLL: g('st_'+p+'LL'),
    bsTL: isC?(g('st_CBS_CL')+g('st_CBS_LL')):g('tot_L'),
    bsSNA: g('st_'+p+'NA'),
    bsNA: g(isC?'tot_CBS_NA':'tot_NA'),
    bsTLE: g(isC?'tot_CBS_LE':'tot_LE'),
  };
}

function calcPL(d,isC=false){
  const m=computeFS(d);
  const g=id=>m[String(id)]||0;
  // CPL uses CPL_ prefixed IDs, PL uses plain IDs
  const pre=isC?'CPL_':'';
  const net=g('calc_'+pre+'NET')||g('calc_NET');
  const preT=g('calc_'+pre+'PRE')||g('calc_PRE');
  const minor=isC?g('cpl_minority'):0;
  const parent=isC?g('calc_CPL_PARENT'):net;
  return {
    map:m,
    sales:g('st_'+pre+'REV')||g('st_REV'), pre:preT,
    tax:g('st_'+pre+'TAX')||g('calc_TAX'), net, minor, parent,
  };
}


function calcCF(d,preTax,stmtType){
  // v12.3: マスタ駆動 — computeFSで小計/合計まで計算、net/closeは明示計算
  if(!stmtType) stmtType=(d===S.ccf||d===S.prev_ccf)?'CCF':'CF';
  const pre=stmtType==='CCF'?'ccf':'cf';
  // PL連動の税前利益を自動注入
  d[pre+'_01']=String(Math.round(preTax||0));
  const m=computeFS(d);
  const opCF=m['st_'+stmtType+'_OP']||0;
  const invCF=m['st_'+stmtType+'_INV']||0;
  const finCF=m['st_'+stmtType+'_FIN']||0;
  const exchDiff=m[pre+'_exch']||0;
  const netCF=opCF+invCF+finCF+exchDiff;
  const openCash=m[pre+'_20']||0;
  const close=netCF+openCash;
  // mapにも反映（プレビュー/印刷で使用）
  m[pre+'_net']=netCF;
  m[pre+'_close']=close;
  return {
    map:m,
    opSub:m['st_'+stmtType+'_OP1']||0,
    opCF,invCF,finCF,exchDiff,netCF,close
  };
}

function calcEQ(d,netIncome,isC=false){
  const niOverride=d.netIncomeEq!==''&&d.netIncomeEq!==undefined?num(d.netIncomeEq):netIncome;
  const ni=niOverride;
  const end=num(d.prevRetained)-num(d.dividends)+ni;
  const mni=isC?num(d.minorityNetInc||'0'):0;
  const endMin=isC?num(d.prevMinority||'0')+mni:0;
  return {ni,end,mni,endMin};
}


// ═══ 株主資本等変動計算書 — マトリクス方式 ═══

// v11.3: マスタからeqDef（cols/rows/data）を構築
function _buildEqDef(stKey){
  const stmtType=(stKey==='ceq'||stKey==='prev_ceq')?'CEQ':'EQ';
  const colAccts=S.accounts.filter(a=>a.stmt===stmtType&&a.type==='eq_col');
  const rowAccts=S.accounts.filter(a=>a.stmt===stmtType&&(a.type==='eq_row'||a.type==='eq_row_header'||a.type==='eq_row_calc'));
  const cols=colAccts.map(a=>({
    key:String(a.id),name:a.name,
    ...(a.group?{group:a.group}:{}),
    ...(a.sub?{sub:a.sub}:{}),
    ...(a.sub2?{sub2:a.sub2}:{}),
    ...(a.calc?{calc:a.calc.map(String)}:{})
  }));
  const rows=rowAccts.map(a=>{
    const r={key:String(a.id),label:a.name};
    if(a.type==='eq_row_header')r.isHeader=true;
    if(a.type==='eq_row_calc')r.isCalc=a.isCalc||'sum';
    return r;
  });
  if(!S[stKey])S[stKey]={};
  if(!S[stKey].data)S[stKey].data={};
  return {cols,rows,data:S[stKey].data};
}

function ensureEqDef(stKey){
  const d=S[stKey];
  if(!d){S[stKey]={data:{}};return _buildEqDef(stKey);}
  const isC=(stKey==='ceq');
  const pre=isC?'ceq_c_':'eq_c_';
  const rPre=isC?'ceq_r_':'eq_r_';
  // v11.3 マイグレーション: 旧eqDef.data → S[stKey].data + キー変換
  if(d.eqDef&&d.eqDef.data){
    if(!d.data||Object.keys(d.data).length===0){
      // 旧data全体をコピーし、行キー・列キーを変換
      const newData={};
      const oldCols=d.eqDef.cols||[];
      for(const [oldRowKey,oldRow] of Object.entries(d.eqDef.data)){
        if(!oldRow||typeof oldRow!=='object')continue;
        // 行キー変換: opening→eq_r_opening, _chg→eq_r_chg, etc.
        const cleanR=oldRowKey.replace(/^_/,'');
        const newRowKey=oldRowKey.startsWith(rPre)?oldRowKey:rPre+cleanR;
        const newRow={};
        for(const [oldColKey,val] of Object.entries(oldRow)){
          // 列キー変換: capital→eq_c_capital
          const newColKey=oldColKey.startsWith(pre)?oldColKey:pre+oldColKey;
          newRow[newColKey]=val;
        }
        if(Object.keys(newRow).length)newData[newRowKey]=newRow;
      }
      d.data=newData;
    }
    delete d.eqDef;
  }
  if(!d.data)d.data={};
  // 旧フラットフィールド→data マイグレーション
  if(d.prevCapital!==undefined&&(!d.data[rPre+'opening']||Object.keys(d.data[rPre+'opening']||{}).length===0)){
    const op={};
    if(d.prevCapital)op[pre+'capital']=String(num(d.prevCapital));
    if(d.prevSurplus)op[pre+'capTot']=String(num(d.prevSurplus));
    if(d.prevRetained)op[pre+'retCarry']=String(num(d.prevRetained));
    d.data[rPre+'opening']=op;
    if(d.dividends)d.data[rPre+'dividends']={[pre+'retCarry']:String(-num(d.dividends))};
    if(isC&&d.prevMinority)op[pre+'minority']=String(num(d.prevMinority));
    if(isC&&d.minorityNetInc)d.data[rPre+'otherChg']={[pre+'minority']:String(num(d.minorityNetInc))};
  }
  // まだ旧キーが残っている場合の追加変換
  const oldKeys=Object.keys(d.data).filter(k=>!k.startsWith(rPre)&&!k.startsWith('_'));
  if(oldKeys.length){
    for(const oldR of oldKeys){
      const newR=rPre+oldR;
      if(!d.data[newR]){
        const oldRow=d.data[oldR];const newRow={};
        for(const [oc,val] of Object.entries(oldRow||{})){
          newRow[oc.startsWith(pre)?oc:pre+oc]=val;
        }
        if(Object.keys(newRow).length)d.data[newR]=newRow;
      }
      delete d.data[oldR];
    }
  }
  return _buildEqDef(stKey);
}

// ── マトリクス計算 ──
function calcEqMatrix(eqDef){
  const {cols,rows,data}=eqDef;
  const result={};
  const calcCols=cols.filter(c=>c.calc&&c.calc.length);
  const editRows=rows.filter(r=>!r.isHeader&&!r.isCalc);
  // opening行 = 最初のeditRow
  const openingRow=editRows[0];
  const chgRows=editRows.filter(r=>r!==openingRow);

  // 各行の全列値を計算（入力値＋列計算）
  const rowVals=(rKey)=>{
    const raw=data[rKey]||{};
    const vals={};
    cols.forEach(c=>{
      if(c.calc&&c.calc.length) return;
      vals[c.key]=num(raw[c.key]||'0');
    });
    calcCols.forEach(c=>{
      vals[c.key]=(c.calc||[]).reduce((s,k)=>s+(vals[k]||0),0);
    });
    return vals;
  };

  // 入力行
  editRows.forEach(r=>{ result[r.key]=rowVals(r.key); });

  // 変動額合計・当期末残高をisCalcの行キーに格納
  rows.filter(r=>r.isCalc).forEach(r=>{
    if(r.isCalc==='sum'){
      const chgTot={};
      cols.forEach(c=>{ chgTot[c.key]=chgRows.reduce((s,cr)=>s+(result[cr.key]?.[c.key]||0),0); });
      result[r.key]=chgTot;
    } else if(r.isCalc==='close'){
      const closing={};
      const chgTotRow=rows.find(x=>x.isCalc==='sum');
      const chgTot=chgTotRow?result[chgTotRow.key]:{};
      cols.forEach(c=>{ closing[c.key]=(openingRow?result[openingRow.key]?.[c.key]||0:0)+(chgTot[c.key]||0); });
      result[r.key]=closing;
    }
  });

  return result;
}

// ── 多段ヘッダー生成（3段: group / sub / column name） ──
function eqHeaderRows(cols){
  // 1段目: group (colspan)
  const groups=[]; let lastG='';
  cols.forEach(c=>{
    const g=c.group||c.name;
    if(g===lastG){groups[groups.length-1].span++;}
    else{groups.push({name:g,span:1,isLeaf:!c.group});lastG=g;}
  });
  // 2段目: sub within each group (colspan), or direct col name
  const subs=[]; let lastS='';
  cols.forEach(c=>{
    const s=c.sub||(c.group?c.name:'');
    const g=c.group||c.name;
    const key=g+'|'+s;
    if(s&&key===lastS){subs[subs.length-1].span++;}
    else{subs.push({name:s||c.name,span:1,group:g,hasSub:!!c.sub,key:key});lastS=key;}
  });
  // 3段目: actual col names (only for cols with sub)
  const leafs=cols.map(c=>({name:c.name,hasSub:!!c.sub,hasSub2:!!c.sub2}));

  return {groups,subs,leafs};
}

// ── v12.0: ゼロ科目フィルタ ──
// accts: マスタの科目配列、valMap: computeFS結果 or {[id]:value}
// keepIds: 常に表示するID Set (tot_A, tot_LE等の最終合計)
// Returns: フィルタ後の科目配列
function _filterZeroAccts(accts, valMap, keepIds, editMode){
  if(SHOW_ALL) return accts;
  if(!valMap) return accts;
  const keep=keepIds||new Set();
  // editMode: item行は常に表示（入力可能にする）、header/subtotalのみゼロで非表示
  // previewMode(!editMode): item含め全てゼロで非表示
  const visible=new Set();
  const hasValue=new Set();
  accts.forEach(a=>{
    if(keep.has(a.id)){visible.add(a.id);return;}
    if(a.type==='header'||a.type==='eq_row_header')return;
    const val=valMap[String(a.id)]||0;
    if(editMode&&(a.type==='item'||a.type==='eq_row')){
      // 編集モード: item行は常にvisible
      visible.add(a.id);
      if(val!==0) hasValue.add(a.id);
    } else if(val!==0){
      visible.add(a.id);
      if(a.type==='item'||a.type==='eq_row') hasValue.add(a.id);
    }
  });
  for(let i=0;i<accts.length;i++){
    const a=accts[i];
    if(a.type!=='header'&&a.type!=='eq_row_header')continue;
    let found=false;
    for(let j=i+1;j<accts.length;j++){
      const b=accts[j];
      if(b.type==='header'||b.type==='eq_row_header')break;
      if(editMode?visible.has(b.id):hasValue.has(b.id)){found=true;break;}
    }
    if(found) visible.add(a.id);
  }
  accts.forEach(a=>{
    if(a.type!=='subtotal')return;
    if(visible.has(a.id))return;
    const hasCatItem=accts.some(x=>x.type==='item'&&x.cat===a.cat&&(editMode?true:hasValue.has(x.id)));
    if(hasCatItem) visible.add(a.id);
  });
  return accts.filter(a=>visible.has(a.id));
}

// 比較FS用: 前期or当期どちらかに値があれば表示
function _filterZeroCompare(accts, curMap, prevMap, keepIds){
  if(SHOW_ALL) return accts;
  const merged={};
  accts.forEach(a=>{
    const sid=String(a.id);
    merged[sid]=(curMap[sid]||0)||(prevMap[sid]||0);
  });
  return _filterZeroAccts(accts, merged, keepIds);
}

// ── v11.1: BS/CBS 資産・負債分離ヘルパー ──
function _bsSplitAccts(isC){
  if(isC){
    const accts=S.accounts.filter(a=>a.stmt==='CBS');
    const assetCats=new Set(['CBS_CA','CBS_FA','CBS_DEF']);
    const liabCats=new Set(['CBS_CL','CBS_LL','CBS_NA','CBS_OCI','CBS_MIN']);
    const assetAccts=accts.filter(a=>
      (a.type==='header'&&(String(a.id).startsWith('cbs_h_ca')||String(a.id).startsWith('cbs_h_fa')||String(a.id).startsWith('cbs_h_def')))||
      (a.type==='item'&&assetCats.has(a.cat))||
      (a.type==='subtotal'&&assetCats.has(a.cat))||
      (a.type==='total'&&a.id==='tot_CBS_A')
    );
    const liabAccts=accts.filter(a=>
      (a.type==='header'&&(String(a.id).startsWith('cbs_h_cl')||String(a.id).startsWith('cbs_h_ll')||String(a.id).startsWith('cbs_h_na')||String(a.id)==='cbs_h_oci'))||
      (a.type==='item'&&liabCats.has(a.cat))||
      (a.type==='subtotal'&&liabCats.has(a.cat))||
      (a.type==='total'&&(a.id==='tot_CBS_NA'||a.id==='tot_CBS_LE'))
    );
    return {accts,assetAccts,liabAccts};
  } else {
    const accts=S.accounts.filter(a=>a.stmt==='BS');
    const assetCats=new Set(['CA','FA','DEF']);
    const liabCats=new Set(['CL','LL','NA']);
    const assetAccts=accts.filter(a=>
      (a.type==='header'&&(a.id.startsWith('h_ca')||a.id.startsWith('h_fa')||a.id.startsWith('h_def')))||
      (a.type==='item'&&assetCats.has(a.cat))||
      (a.type==='subtotal'&&assetCats.has(a.cat))||
      (a.type==='total'&&a.id==='tot_A')
    );
    const liabAccts=accts.filter(a=>
      (a.type==='header'&&(a.id.startsWith('h_cl')||a.id.startsWith('h_ll')||a.id.startsWith('h_na')))||
      (a.type==='item'&&liabCats.has(a.cat))||
      (a.type==='subtotal'&&liabCats.has(a.cat))||
      (a.type==='total'&&(a.id==='tot_L'||a.id==='tot_NA'||a.id==='tot_LE'))
    );
    return {accts,assetAccts,liabAccts};
  }
}

  return `<div style="max-width:900px">${h2(title)}

// ── 編集UI ──
function eqEdit(stKey,title,isC=false){
  const eqDef=ensureEqDef(stKey);
  const {cols,rows}=eqDef;
  const m=calcEqMatrix(eqDef);
  const dis=LOCKED?'disabled':'';
  const hdr=eqHeaderRows(cols);

  // ヘッダー3段: 最下段を縦書き
  const thBase='padding:3px 3px;font-size:11px;text-align:center;background:#1a2744;color:#fff;border:1px solid #2a3f6e;line-height:1.2';
  const vStFn=(name)=>{const isLong=name.length>8;return `${thBase};writing-mode:vertical-rl;height:120px;letter-spacing:.03em;${isLong?'line-height:1.5':'white-space:nowrap'}`;};
  const row1=`<tr><th style="${thBase};padding:3px 6px;font-size:10px;min-width:100px" rowspan="3">区分</th>${hdr.groups.map(g=>`<th style="${thBase}" colspan="${g.span}">${escV(g.name)}</th>`).join('')}</tr>`;
  const row2=`<tr>${hdr.subs.map(s=>{
    if(!s.hasSub) return `<th style="${vStFn(s.name)}" rowspan="2">${escV(s.name)}</th>`;
    return `<th style="${thBase}" colspan="${s.span}">${escV(s.name)}</th>`;
  }).join('')}</tr>`;
  const row3=`<tr>${hdr.leafs.filter(l=>l.hasSub).map(l=>`<th style="${vStFn(l.name)}">${escV(l.name)}</th>`).join('')}</tr>`;

  // データ行
  const dataRows=rows.map(r=>{
    if(r.isHeader) return `<tr><td colspan="${cols.length+1}" style="font-size:9px;font-weight:700;color:#3d5499;padding:4px 6px;background:#f5f7ff;border:1px solid #dde0e8">${esc(r.label)}</td></tr>`;
    const isCalc=!!r.isCalc;
    const rBg=isCalc?'background:#eef2ff;':'';
    const rBold=isCalc||r.key==='opening'?'font-weight:700;':'';
    const isClose=r.isCalc==='close';
    const borderTop=isClose?'border-top:2px solid #1a2744;border-bottom:2px solid #1a2744;':r.key==='opening'?'border-bottom:2px solid #1a2744;':'';
    const closeBg=isClose?'background:#dde4f8;':'';
    // ラベル列のnowrap削除
    return `<tr style="${closeBg||rBg}"><td style="padding:3px 6px;font-size:11px;${rBold}${borderTop}border:1px solid #dde0e8;line-height:1.2">${esc(r.label)}</td>${cols.map(c=>{
      const val=m[r.key]?.[c.key]||0;
      if(isCalc||(c.calc&&c.calc.length)){
        return `<td style="text-align:right;padding:2px 4px;font-size:11px;${rBold}${borderTop}border:1px solid #dde0e8;color:#1a2744;white-space:nowrap">${val?fmtSK(val):''}</td>`;
      }
      const raw=(S[stKey].data[r.key]||{})[c.key]||'';
      return `<td style="padding:1px 1px;${borderTop}border:1px solid #dde0e8"><input class="n" style="width:58px;padding:1px 2px;font-size:10px;text-align:right" value="${esc(fmtInp(raw))}" ${dis}
        oninput="if(!LOCKED){if(!S['${stKey}'].data['${r.key}'])S['${stKey}'].data['${r.key}']={};S['${stKey}'].data['${r.key}']['${c.key}']=this.value;}" onchange="if(!LOCKED)renderContent()"></td>`;
    }).join('')}</tr>`;
  }).join('');

  // 列管理ボタン
  const colMgmt=`<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;font-size:10px">
    <button class="btn-add" style="font-size:10px;padding:3px 8px" ${dis}
      onclick="eqAddCol('${stKey}')">＋ 列追加</button>
    <button class="btn-add" style="font-size:10px;padding:3px 8px" ${dis}
      onclick="eqAddRow('${stKey}')">＋ 行追加（変動項目）</button>
    <button class="btn-sm" style="background:#3d5499;font-size:10px;padding:3px 8px" ${dis}
      onclick="eqEditCols('${stKey}')">⚙ 列構成を編集</button>
  </div>`;

  return `<div style="max-width:100%">${h2(title)}
  <div style="font-size:10px;color:#888;margin-bottom:8px">横スクロールで全列を確認できます。列・行の追加・編集は下部のボタンから。</div>
  <div style="overflow-x:auto;max-width:100%;border:1px solid #ccc;border-radius:4px">
    <table style="border-collapse:collapse;font-size:11px">
      <thead>${row1}${row2}${row3}</thead>
      <tbody>${dataRows}</tbody>
    </table>
  </div>
  ${colMgmt}
  </div>`;
}

// 列追加（マスタにeq_colエントリを追加）
function eqAddCol(stKey){
  const stmtType=(stKey==='ceq')?'CEQ':'EQ';
  const pre=(stKey==='ceq')?'ceq_c_':'eq_c_';
  const newId=pre+'col_'+NID++;
  // 純資産合計の前に挿入
  const naTotId=pre+'naTot';
  const idx=S.accounts.findIndex(a=>a.id===naTotId);
  const newAcct={id:newId,name:'新しい列',type:'eq_col',stmt:stmtType};
  S.accounts.splice(idx>=0?idx:S.accounts.length,0,newAcct);
  // 純資産合計のcalcに追加
  const naTot=S.accounts.find(a=>a.id===naTotId);
  if(naTot&&naTot.calc)naTot.calc.push(newId);
  renderContent();
}
// 変動行追加（マスタにeq_rowエントリを追加）
function eqAddRow(stKey){
  const stmtType=(stKey==='ceq')?'CEQ':'EQ';
  const pre=(stKey==='ceq')?'ceq_r_':'eq_r_';
  const newId=pre+'row_'+NID++;
  // 変動額合計の前に挿入
  const chgTotId=pre+'chgTot';
  const idx=S.accounts.findIndex(a=>a.id===chgTotId);
  S.accounts.splice(idx>=0?idx:S.accounts.length,0,{id:newId,name:'　新しい変動項目',type:'eq_row',stmt:stmtType});
  renderContent();
}

function pvEqTable(eqDef,title){
  const {cols,rows}=eqDef;
  const m=calcEqMatrix(eqDef);
  const hdr=eqHeaderRows(cols);
  const thBase='padding:4px 4px;font-size:11.5px;text-align:center;line-height:1.25;border:1px solid #d0d4de';
  // 縦書き列ヘッダー：高さ120px、8文字以内は1列、それ以上は折り返し
  const vSt=(name)=>{
    const isLong=name.length>8;
    return `${thBase};writing-mode:vertical-rl;height:120px;letter-spacing:.03em;${isLong?'line-height:1.5':'white-space:nowrap'}`;
  };

  let h=`${DT(title,true)}${DSfin(DHperiod(),S.co.unit)}`;
  h+=`<div><table class="ft-fin eq-tbl" style="width:100%;table-layout:auto;border-collapse:collapse"><thead>`;
  // 1段目: group
  h+=`<tr><th style="${thBase};min-width:80px" rowspan="3">区分</th>`;
  h+=hdr.groups.map(g=>`<th style="${thBase}" colspan="${g.span}">${escV(g.name)}</th>`).join('')+'</tr>';
  // 2段目: sub or leaf(rowspan=2 + vertical)
  h+=`<tr>${hdr.subs.map(s=>{
    if(!s.hasSub) return `<th style="${vSt(s.name)}" rowspan="2">${escV(s.name)}</th>`;
    return `<th style="${thBase}" colspan="${s.span}">${escV(s.name)}</th>`;
  }).join('')}</tr>`;
  // 3段目: leaf columns (vertical)
  h+=`<tr>${hdr.leafs.filter(l=>l.hasSub).map(l=>`<th style="${vSt(l.name)}">${escV(l.name)}</th>`).join('')}</tr>`;
  h+=`</thead><tbody>`;

  const colBdr='border-right:1px solid #dde0e8;';
  rows.forEach(r=>{
    if(r.isHeader){
      h+=`<tr><td style="font-size:11px;font-weight:700;color:#3d5499;padding:5px 6px;white-space:nowrap;border-bottom:none;${colBdr}">${esc(r.label)}</td>`;
      cols.forEach(()=>{h+=`<td style="border-bottom:none;${colBdr}"></td>`;});
      h+=`</tr>`;return;
    }
    const isCalc=!!r.isCalc;
    const isClose=r.isCalc==='close';
    const cls=isCalc||r.key==='opening'?'b':'';
    const bt=isClose?' bt bb':r.isCalc?' bt':r.key==='opening'?' bb':'';
    const bgSt=isClose?'background:#eef2ff;':'';
    let lbl=esc(r.label);
    lbl=lbl.replace('株主資本以外の項目の当期変動額（純額）','株主資本以外の項目の<br>　　当期変動額（純額）');
    h+=`<tr style="${bgSt}"><td class="${cls}${bt}" style="padding:6px 6px;font-size:13px;line-height:1.3;white-space:nowrap;${colBdr}">${lbl}</td>`;
    cols.forEach(c=>{
      const v=m[r.key]?.[c.key]||0;
      h+=`<td class="r ${cls}${bt}" style="font-size:13px;white-space:nowrap;padding:6px 5px;${colBdr}">${v?fmtSK(v):''}</td>`;
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table></div>`;
  return h;
}

function migrateToNoteItems(stKey){
  const n=S[stKey];
  if(n.noteItems) return;
  migrateNotesToItems(stKey);
  const items=[];
  const secs=['sec1','sec2','sec3','sec4','sec5','sec6','sec7','sec8'];
  const keys=['sec1Items','sec2Items','sec3Items','sec4Items','sec5Items','sec6Items','sec7Items','sec8Items'];
  for(let si=0;si<secs.length;si++){
    const t=(n.secTitles||{})[secs[si]]||'';
    const show=(n.secShow||{})[secs[si]]!==false;
    if(secs[si]==='sec5'){
      items.push({title:t,show,isDividend:true,divItems:n.sec5Items||[]});
    } else {
      items.push({title:t,show,subs:(n[keys[si]]||[]).map(it=>({title:it.title||'',content:it.content||'',html:it.html||''}))});
    }
  }
  (n.customItems||[]).forEach(it=>{
    items.push({title:it.title||'',show:true,subs:[{title:'',content:it.content||''}]});
  });
  n.noteItems=items;
}

        ${item.footnote!==undefined?`<div class="fld" style="margin:4px 0 0 20px"><input style="width:100%;padding:3px 6px;border:1px solid #dde0e8;border-radius:3px;font-size:11px" value="${esc(item.footnote||'')}" ${dis} placeholder="脚注"

// 旧フラット形式 → 新items配列マイグレーション
function migrateNotesToItems(stKey){
  const n=S[stKey];
  if(!n.secTitles)n.secTitles={sec1:'第１　重要な会計方針',sec2:'第２　貸借対照表関係注記',sec3:'第３　損益計算書関係注記',sec4:'第４　税効果会計関係',sec5:'第５　配当に関する事項',sec6:'第６　関連当事者との取引',sec7:'第７　後発事象',sec8:'第８　その他の注記'};
  if(!n.secShow)n.secShow={sec1:true,sec2:true,sec3:true,sec4:true,sec5:true,sec6:true,sec7:true,sec8:true};
  if(!n.customItems)n.customItems=[];
  if(!n.sec1Items){const pt=n.policyTitles||{};const items=[];[['p1','assetValuation','資産の評価基準・評価方法'],['p2','depreciation','固定資産の減価償却方法'],['p3','allowancePolicy','引当金の計上基準'],['p4','revenuePolicy','収益の認識基準'],['p5','retirementBenefit','退職給付の会計処理'],['p6','cashEquivPolicy','現金及び現金同等物の範囲']].forEach(([pk,fk,def])=>{if(n[fk])items.push({title:pt[pk]||def,content:n[fk]});});n.sec1Items=items.length?items:[{title:'資産の評価基準・評価方法',content:''}];}
  if(!n.sec2Items)n.sec2Items=n.bsNotes?[{title:'担保・保証等',content:n.bsNotes}]:[{title:'',content:''}];
  if(!n.sec3Items)n.sec3Items=n.plNotes?[{title:'関係会社取引等',content:n.plNotes}]:[{title:'',content:''}];
  if(!n.sec4Items)n.sec4Items=[{title:'繰延税金資産（千円）',content:n.taxEffectAssets||''},{title:'繰延税金負債（千円）',content:n.taxEffectLiabilities||''}];
  if(!n.sec5Items){
    // 旧形式からのマイグレーション
    const items=[];
    items.push({title:'（１）当事業年度の末日における発行済株式の数', isText:true, content:''});
    if(n.dividendPrev||n.dividendPrevHtml){
      items.push({title:'（２）当事業年度中に行った剰余金の配当に関する事項',
        rows:[{decision:'',stockType:'普通株式',source:'利益剰余金',amount:'',perShare:'',recordDate:'',effectDate:''}]});
    }
    if(n.dividendCurrent||n.dividendCurrentHtml){
      items.push({title:'（３）当事業年度の末日後に行う剰余金の配当の処分に関する事項',note:'',
        rows:[{decision:'',stockType:'普通株式',source:'利益剰余金',amount:'',perShare:'',recordDate:'',effectDate:''}],footnote:''});
    }
    if(!items.length||items.length===1) {
      items.push({title:'（２）当事業年度中に行った剰余金の配当に関する事項',
        rows:[{decision:'',stockType:'普通株式',source:'利益剰余金',amount:'',perShare:'',recordDate:'',effectDate:''}]});
      items.push({title:'（３）当事業年度の末日後に行う剰余金の配当の処分に関する事項',note:'',
        rows:[{decision:'',stockType:'普通株式',source:'利益剰余金',amount:'',perShare:'',recordDate:'',effectDate:''}],footnote:''});
    }
    n.sec5Items=items;
  }
  if(!n.sec6Items)n.sec6Items=n.relatedParties?[{title:'関連当事者取引',content:n.relatedParties}]:[{title:'',content:''}];
  if(!n.sec7Items)n.sec7Items=n.subsequentEvents?[{title:'後発事象',content:n.subsequentEvents}]:[{title:'',content:''}];
  if(!n.sec8Items)n.sec8Items=n.otherNotes?[{title:'その他',content:n.otherNotes}]:[{title:'',content:''}];
}

function editDocOrder(){
  const p=curP();
  const inOrder=new Set(p.docOrder);
  const isEN=PTYPE==='hp_pdf_en';
  // カテゴリ順序
  const CAT_ORDER=isEN
    ?['English（連結）','English（単体）','English（その他）']
    :['表紙','事業報告書','連結計算書類','連結比較資料','単体計算書類','単体比較資料','添付謄本','招集ご通知書類','株主総会資料'];
  const entries=Object.entries(DOC_META).filter(([id])=>{
    if(id==='cover')return false; // 後方互換用は非表示
    return isEN?id.startsWith('en_'):!id.startsWith('en_');
  });
  // カテゴリでグループ化
  const grouped={};
  entries.forEach(([id,m])=>{
    const cat=m.cat||'その他';
    if(!grouped[cat])grouped[cat]=[];
    grouped[cat].push([id,m]);
  });
  const CAT_COLORS={'表紙':'#6a3d99','事業報告書':'#2d6a4f','連結計算書類':'#3d5499','連結比較資料':'#3d5499','単体計算書類':'#8b6914','単体比較資料':'#8b6914','添付謄本':'#555','招集ご通知書類':'#c0392b','株主総会資料':'#0d6efd','English（連結）':'#3d5499','English（単体）':'#8b6914','English（その他）':'#555'};
  let commonItems='';
  CAT_ORDER.forEach(cat=>{
    const items=grouped[cat];
    if(!items||!items.length)return;
    const color=CAT_COLORS[cat]||'#555';
    commonItems+=`<div style="font-size:10px;font-weight:700;color:${color};padding:6px 4px 3px;margin-top:6px;border-bottom:1px solid ${color}40;letter-spacing:.04em">${cat}</div>`;
    items.forEach(([id,m])=>{
      const chk=inOrder.has(id);
      commonItems+=`<div class="lib-item${chk?' lib-in':''}" draggable="true"
        ondragstart="libDragStart(event,'${id}')" ondragend="libDragEnd(event,this)">

          oninput="extraDocUpd('${PTYPE}',${i},'name',this.value)" onblur="renderContent()">
        ${chk?`<button onclick="extraDocOrderToggle('${PTYPE}','${doc.id}',false)" class="lib-btn lib-btn-red">✕</button>`

function accCellStop(e){if(e){e.stopPropagation();}}
function accCompStart(e){if(e&&e.target)e.target.dataset.composing="1";}
function accNormalizeName(v){
  v=String(v||'');
  const m=v.match(/^([㐀-鿿々〆ヶ]+)([ァ-ヴー]{3,})$/);
  return m?m[1]:v;
}
function accCommitField(id,k,el){
  if(!el) return;
  if(el.dataset&&el.dataset.composing==='1') return;
  let v=el.type==='checkbox'?el.checked:el.value;
  if(k==='name'){
    v=accNormalizeName(v);
    if(el.value!==v) el.value=v;
  }
  accUpd(id,k,v);
}
function accCompEnd(id,k,e){
  if(!e||!e.target) return;
  const el=e.target;
  setTimeout(()=>{el.dataset.composing='';accCommitField(id,k,el);},0);
}
function accInput(id,k,e){
  if(!e||!e.target)return;
  if(e.target.dataset.composing==="1") return;
  const v=e.target.type==='checkbox'?e.target.checked:e.target.value;
  accUpd(id,k,v);
}
function accHandleDragStart(e,id){
  accCellStop(e);
  accDragStart(e,id);
}
function accHandleDragEnd(e,el){
  accDragEnd(e,el.closest('tr')||el);
}

    const isEqCol=a.type==='eq_col';

    // EQグループ/サブのドロップダウン生成
    const eqGroupOpts=isEqCol?(()=>{

function accPick(id){
  ACC_ACTIVE_ID=String(id);
  document.querySelectorAll('.acc-row-selected').forEach(el=>el.classList.remove('acc-row-selected'));
  const row=document.querySelector(`tr[data-acc-id="${String(id).replace(/"/g,'&quot;')}"]`);
  if(row) row.classList.add('acc-row-selected');
  const info=document.getElementById('acc-active-info');
  if(info) info.textContent=ACC_ACTIVE_ID?` / 選択ID: ${ACC_ACTIVE_ID}`:'';
}
function accDragStart(e,id){
  if(LOCKED){e.preventDefault();return;}
  _accDragId=String(id);
  ACC_ACTIVE_ID=String(id);
  e.dataTransfer.effectAllowed='move';
  e.currentTarget.classList.add('acc-dragging');
}
function accDragOver(e){if(_accDragId)e.preventDefault();}
function accDragEnter(e,el){if(_accDragId)e.preventDefault(),el.classList.add('acc-row-drop');}
function accDragLeave(e,el){el.classList.remove('acc-row-drop');}
function accDrop(e,targetId){
  e.preventDefault();
  const el=e.currentTarget; el.classList.remove('acc-row-drop');
  if(!_accDragId||String(targetId)===String(_accDragId)) return;
  const fromIdx=S.accounts.findIndex(x=>String(x.id)===String(_accDragId));
  const toIdx=S.accounts.findIndex(x=>String(x.id)===String(targetId));
  if(fromIdx<0||toIdx<0) return;
  const from=S.accounts[fromIdx], to=S.accounts[toIdx];
  if(from.stmt!==to.stmt){showToast('⚠ 同じ表の中でのみ並び替えできます');_accDragId=null;return;}
  const [moved]=S.accounts.splice(fromIdx,1);
  const insertIdx=fromIdx<toIdx?toIdx:toIdx;
  S.accounts.splice(insertIdx,0,moved);
  ACC_ACTIVE_ID=String(moved.id);
  _accDragId=null;
  renderContent();
}
function accDragEnd(e,el){el.classList.remove('acc-dragging');el.classList.remove('acc-row-drop');_accDragId=null;}
function accUpdType(id,newType){
  const a=S.accounts.find(x=>String(x.id)===String(id));
  if(!a)return;
  ACC_ACTIVE_ID=String(id);
  a.type=newType;
  if(newType==='subtotal'&&!a.cat)a.cat='CA';
  if(newType==='total'&&!a.sumOf)a.sumOf=[];
  if(newType==='calc'&&!a.formula)a.formula='0';
  renderContent();
}
function accAddForTab(){
  const stmt=ACC_TAB;
  const isEqStmt=(stmt==='EQ'||stmt==='CEQ');
  const defaultCatMap={BS:'CA',PL:'REV',CF:'CF_OP1',CBS:'CBS_CA',CPL:'CPL_REV',CCF:'CCF_OP1'};
  let insertAt=null;
  if(ACC_ACTIVE_ID){
    const activeIdx=S.accounts.findIndex(a=>String(a.id)===String(ACC_ACTIVE_ID));
    if(activeIdx>=0 && S.accounts[activeIdx].stmt===stmt) insertAt=activeIdx+1;
  }
  if(insertAt===null){
    const lastIdx=S.accounts.map((a,i)=>a.stmt===stmt?i:-1).filter(i=>i>=0).pop();
    insertAt=(lastIdx===undefined||lastIdx===null)?S.accounts.length:lastIdx+1;
  }
  let newAcc;
  if(isEqStmt){
    // EQ/CEQタブ: 行追加ならeq_row、列追加ならeq_col
    const pre=stmt==='CEQ'?'ceq_r_':'eq_r_';
    newAcc={id:pre+'row_'+NID++,name:'　新しい変動項目',type:'eq_row',stmt:stmt};
  } else {
    const defCat=defaultCatMap[stmt]||'CA';
    newAcc={id:NID++,code:'',name:'新しい科目',type:'item',stmt:stmt,cat:defCat,deduct:false};
  }
  S.accounts.splice(insertAt,0,newAcc);
  ACC_ACTIVE_ID=String(newAcc.id);
  renderContent();
}

  if((doc.type==='image'||doc.type==='pdf'||doc.type==='excel')&&!doc.dataUrl)return '';

// SVGグラフ
function _svgBar(data,labels,seriesNames,colors,w,h,title){
  const n=labels.length;const ns=data.length;if(!n||!ns)return '';
  const mx=Math.max(...data.flat().map(v=>num(v)||0))||1;
  const pad={t:40,b:50,l:60,r:20};
  const cw=(w-pad.l-pad.r)/n;const bw=Math.min(cw*0.7/ns,30);
  let svg=`<svg viewBox="0 0 ${w} ${h}" style="width:100%;max-width:${w}px;font-family:'Yu Gothic UI',sans-serif">`;
  svg+=`<text x="${w/2}" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#1a2744">${esc(title)}</text>`;
  const steps=5;for(let i=0;i<=steps;i++){
    const y=pad.t+(h-pad.t-pad.b)*(1-i/steps);const v=Math.round(mx*i/steps);
    svg+=`<line x1="${pad.l}" y1="${y}" x2="${w-pad.r}" y2="${y}" stroke="#eee"/>`;
    svg+=`<text x="${pad.l-6}" y="${y+4}" text-anchor="end" font-size="9" fill="#888">${v.toLocaleString()}</text>`;
  }
  data.forEach((series,si)=>{series.forEach((v,xi)=>{
    const val=num(v)||0;const bh=(val/mx)*(h-pad.t-pad.b);
    const x=pad.l+xi*cw+(cw-bw*ns)/2+si*bw;const y=h-pad.b-bh;
    svg+=`<rect x="${x}" y="${y}" width="${bw-1}" height="${bh}" fill="${colors[si%colors.length]}" rx="2"/>`;
    if(val)svg+=`<text x="${x+bw/2}" y="${y-3}" text-anchor="middle" font-size="8" fill="#555">${Math.round(val).toLocaleString()}</text>`;
  });});
  labels.forEach((l,i)=>{svg+=`<text x="${pad.l+i*cw+cw/2}" y="${h-pad.b+16}" text-anchor="middle" font-size="10" fill="#333">${esc(l)}</text>`;});
  seriesNames.forEach((nm,i)=>{const lx=pad.l+i*100;svg+=`<rect x="${lx}" y="${h-14}" width="10" height="10" fill="${colors[i%colors.length]}" rx="2"/><text x="${lx+14}" y="${h-5}" font-size="9" fill="#555">${esc(nm)}</text>`;});
  return svg+`</svg>`;
}
function _svgPie(slices,w,title){
  const h=w;const cx=w/2;const cy=h/2;const r=Math.min(w,h)/2-40;
  const total=slices.reduce((s,v)=>s+(num(v.val)||0),0)||1;
  const colors=['#3d5499','#c9a84c','#27ae60','#e74c3c','#8e44ad','#f39c12','#1abc9c'];
  let angle=-Math.PI/2;
  let svg=`<svg viewBox="0 0 ${w} ${h}" style="width:100%;max-width:${w}px;font-family:'Yu Gothic UI',sans-serif">`;
  svg+=`<text x="${cx}" y="16" text-anchor="middle" font-size="10" font-weight="700" fill="#1a2744">${esc(title)}</text>`;
  slices.forEach((s,i)=>{
    const val=num(s.val)||0;const pct=val/total;const a1=angle;const a2=angle+pct*Math.PI*2;
    if(pct>0.001){
      const la=pct>0.5?1:0;
      const x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1),x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
      svg+=`<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${la},1 ${x2},${y2} Z" fill="${colors[i%colors.length]}"/>`;
      const mid=a1+pct*Math.PI;const tx=cx+r*0.6*Math.cos(mid);const ty=cy+r*0.6*Math.sin(mid);
      if(pct>0.05)svg+=`<text x="${tx}" y="${ty+3}" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">${Math.round(pct*100)}%</text>`;
    }
    angle=a2;
  });
  slices.forEach((s,i)=>{const lx=8+i*(w/Math.max(slices.length,1));svg+=`<rect x="${lx}" y="${h-16}" width="8" height="8" fill="${colors[i%colors.length]}" rx="1"/><text x="${lx+11}" y="${h-8}" font-size="8" fill="#555">${esc(s.name)}</text>`;});
  return svg+`</svg>`;
}

function _pvBrSub(sub){
  if(!sub.show)return '';
  const title=sub.subTitle?`<div style="font-size:13.5px;font-weight:700;color:#3d5499;margin-bottom:5px">${esc(sub.subTitle)}</div>`:'';
  if(sub.tableMode){
    const hdrs=sub.tableHeaders||[];
    const tRows=sub.tableRows||[];
    const th=hdrs.map((h,hi)=>{
      const cw=(sub.colWidths||[])[hi];
      const wSt=cw?`width:${cw};white-space:nowrap;`:'';
      return `<th style="padding:5px 8px;font-size:12px;background:#f5f7ff;border:1px solid #ccc;font-weight:600;color:#1a2744;${wSt}">${esc(h)}</th>`;
    }).join('');
    const tds=tRows.map(r=>`<tr>${(r.cells||[]).map((c,ci)=>{
      const cw=(sub.colWidths||[])[ci];
      const wSt=cw?`width:${cw};white-space:nowrap;`:'';
      return `<td style="padding:4px 8px;font-size:12px;border:1px solid #ddd;line-height:1.5;${wSt}">${esc(c).replace(/\n/g,'<br>')}</td>`;
    }).join('')}</tr>`).join('');
    // 合計行
    let totalHtml='';
    if(sub.totalRow){
      const totCells=hdrs.map((h,ci)=>{
        if(ci===0)return `<td style="padding:5px 8px;font-size:12px;font-weight:700;border:1px solid #ccc;background:#eef2ff;text-align:center">合計</td>`;
        let sum=0;let hasVal=false;let isPercent=false;
        tRows.forEach(r=>{
          const raw=String((r.cells||[])[ci]||'');
          if(raw.includes('%')){isPercent=true;const n=parseFloat(raw);if(!isNaN(n)){sum+=n;hasVal=true;}}
          else{const n=parseFloat(raw.replace(/,/g,''));if(!isNaN(n)){sum+=n;hasVal=true;}}
        });
        const display=hasVal?(isPercent?sum.toFixed(1)+'%':sum.toLocaleString()):'';
        return `<td style="padding:5px 8px;font-size:12px;font-weight:700;border:1px solid #ccc;background:#eef2ff;text-align:right">${display}</td>`;
      }).join('');
      totalHtml=`<tr>${totCells}</tr>`;
    }
    // extraFields（rowspanで統合）
    let extraThHtml='';
    let hasExtra=!!(sub.extraFields&&(sub.extraFields.avgAge||sub.extraFields.avgTenure));
    if(hasExtra){
      const ef=sub.extraFields;
      const rSpan=Math.max(tRows.length,1)+(sub.totalRow?1:0);
      extraThHtml=`<th style="padding:5px 8px;font-size:12px;background:#f5f7ff;border:1px solid #ccc;font-weight:600;color:#1a2744">平均年齢</th>
        <th style="padding:5px 8px;font-size:12px;background:#f5f7ff;border:1px solid #ccc;font-weight:600;color:#1a2744">平均勤続年数</th>`;
      const pvRows=tRows.map((r,ri)=>{
        const rowCells=(r.cells||[]).map(c=>`<td style="padding:4px 8px;font-size:12px;border:1px solid #ddd;line-height:1.5">${esc(c)}</td>`).join('');
        const extra=ri===0?`<td rowspan="${rSpan}" style="padding:4px 8px;font-size:12px;border:1px solid #ddd;vertical-align:middle;text-align:center">${esc(ef.avgAge||'')}</td>
          <td rowspan="${rSpan}" style="padding:4px 8px;font-size:12px;border:1px solid #ddd;vertical-align:middle;text-align:center">${esc(ef.avgTenure||'')}</td>`:'';
        return `<tr>${rowCells}${extra}</tr>`;
      }).join('');
      return `<div style="margin-bottom:14px">${title}<table style="width:100%;border-collapse:collapse;margin-top:4px"><thead><tr>${th}${extraThHtml}</tr></thead><tbody>${pvRows}${totalHtml}</tbody></table></div>`;
    }

function _pvCFMaster(stKey,stmtType,title,dataFin){
  const isC=(stmtType==='CCF');
  const plC=isC?calcPL(S.cpl,true):calcPL(S.pl,false);
  const d=S[stKey]||{};
  const c=calcCF(d,plC.pre,stmtType);
  const m=c.map||{};
  const pre=isC?'ccf':'cf';
  const keepCF=new Set([pre+'_net',pre+'_close',pre+'_exch','st_'+stmtType+'_OP','st_'+stmtType+'_OP1','st_'+stmtType+'_INV','st_'+stmtType+'_FIN']);
  const accts=_filterZeroAccts(S.accounts.filter(a=>a.stmt===stmtType),m,keepCF);
  let rows='';
  accts.forEach(a=>{
    const sid=String(a.id);
    const val=m[sid]||0;
    const isRoman=/^[ⅠⅡⅢⅣⅤⅥⅦⅧⅨⅩ]|^[IVX]{1,4}\s/.test(a.name);
    switch(a.type){
      case 'header':
        rows+=crwB(a.name,'');break;
      case 'item':
        if(isRoman) rows+=crwB(a.name,val,false);
        else rows+=crw(a.name,val,'i2');
        break;
      case 'subtotal':
        rows+=`<tr><td class="i1 b bt">${escV(a.name)}</td><td class="r b bt">${fmtK(val)}</td></tr>`;break;
      case 'total':
        rows+=`<tr><td class="i1 b bt">${escV(a.name)}</td><td class="r b bt">${fmtK(val)}</td></tr>`;break;
      case 'calc':{
        const isFinal=sid===pre+'_close';
        if(isRoman) rows+=crwB(a.name,val,true,isFinal?'bb':'');
        else rows+=`<tr><td class="i1 b bt${isFinal?' bb':''}">${escV(a.name)}</td><td class="r b bt${isFinal?' bb':''}">${fmtK(val)}</td></tr>`;
        break;
      }
    }
  });
  return `<div class="doc-page doc-page-fin" data-fin="${dataFin}">
  ${DH()}${DT(title)}
  <div style="max-width:520px;margin:0 auto">
  ${DSfin(DHperiod(),S.co.unit)}
  <table class="ft-fin" style="width:100%"><thead><tr><th>科目</th><th style="text-align:right;width:120px">金額</th></tr></thead><tbody>
  ${rows}
  </tbody></table>
  </div></div>`;
}

    if(di.note) html+=`<p class="br-text" style="margin-bottom:6px;padding-left:16px">${esc(di.note)}</p>`;
    const rows=di.rows||[];
    if(rows.length){

// v13.2: PDF.js canvas描画（ビューアUI非表示）
let _pdfjsLoaded=false;
let _pdfjsLoading=false;
const _pdfPageCache={}; // {dataUrl: ['data:image/png;...', ...]}
function _loadPdfJs(cb){
  if(_pdfjsLoaded){cb();return;}
  if(_pdfjsLoading){setTimeout(()=>_loadPdfJs(cb),200);return;}
  _pdfjsLoading=true;
  const sc=document.createElement('script');
  sc.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
  sc.onload=()=>{
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    _pdfjsLoaded=true;_pdfjsLoading=false;cb();
  };
  sc.onerror=()=>{_pdfjsLoading=false;cb('error');};
  document.head.appendChild(sc);
}
function _renderPdfCanvases(containerId,dataUrl,scale){
  scale=scale||1.5;
  const container=document.getElementById(containerId);
  if(!container)return;
  // キャッシュがあればimg表示
  if(_pdfPageCache[dataUrl]){
    container.innerHTML=_pdfPageCache[dataUrl].map(src=>`<img src="${src}" style="display:block;margin:0 auto 4px;max-width:100%;box-shadow:0 1px 4px rgba(0,0,0,.08)">`).join('');
    return;
  }
  container.innerHTML='<div style="text-align:center;padding:20px;color:#888;font-size:12px">⏳ PDF読込中...</div>';
  _loadPdfJs((err)=>{
    if(err||!window.pdfjsLib){
      container.innerHTML=`<iframe src="${dataUrl}#toolbar=0&navpanes=0&scrollbar=0" style="width:100%;height:860px;border:none"></iframe>`;
      return;
    }
    const loadingTask=pdfjsLib.getDocument(dataUrl);
    loadingTask.promise.then(pdf=>{
      container.innerHTML='';
      const pages=[];
      const renderPage=(pgNum)=>{
        if(pgNum>pdf.numPages){
          _pdfPageCache[dataUrl]=pages;
          return;
        }
        pdf.getPage(pgNum).then(page=>{
          const vp=page.getViewport({scale});
          const canvas=document.createElement('canvas');
          canvas.width=vp.width;canvas.height=vp.height;
          canvas.style.cssText='display:block;margin:0 auto 4px;max-width:100%;box-shadow:0 1px 4px rgba(0,0,0,.08)';
          container.appendChild(canvas);
          page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise.then(()=>{
            try{pages.push(canvas.toDataURL('image/png'));}catch(e){}
            renderPage(pgNum+1);
          });
        });
      };
      renderPage(1);
    }).catch(()=>{
      container.innerHTML=`<iframe src="${dataUrl}#toolbar=0&navpanes=0&scrollbar=0" style="width:100%;height:860px;border:none"></iframe>`;
    });
  });
}
let _pdfCid=0;
function _pdfContainer(dataUrl){
  const cid='pdf-cv-'+(++_pdfCid);
  // キャッシュがあれば即座にimg表示
  if(_pdfPageCache[dataUrl]){
    return `<div id="${cid}">${_pdfPageCache[dataUrl].map(src=>`<img src="${src}" style="display:block;margin:0 auto 4px;max-width:100%;box-shadow:0 1px 4px rgba(0,0,0,.08)">`).join('')}</div>`;

function calcSummaryData(isC=true){
  const curPL=isC?calcPL(S.cpl,true):calcPL(S.pl,false);
  const curBS=calcBS(isC?S.cbs:S.bs,isC?'cbs':'bs');
  const prevPLdata=isC?(S.prev_cpl||{}):(S.prev_pl||{});
  const prevBSdata=isC?(S.prev_cbs||{}):(S.prev_bs||{});
  const hasPrev=Object.keys(prevPLdata).length>0;
  const prevPL=hasPrev?calcPL(prevPLdata,isC):{sales:0,pre:0,tax:0,net:0,minor:0,parent:0,map:{}};
  const prevBS=Object.keys(prevBSdata).length?calcBS(prevBSdata,isC?'prev_cbs':'prev_bs'):{bsTA:0,bsTLE:0,bsNA:0,bsTL:0,map:{}};
  const pre=isC?'CPL_':'';
  const curNet=isC?(curPL.map['calc_CPL_PARENT']||curPL.net):curPL.net;
  const prevNet=isC?(prevPL.map['calc_CPL_PARENT']||prevPL.net):prevPL.net;
  const shares=parseInt(String(S.co.shares||'0').replace(/,/g,''),10)||0;
  const prevSharesN=parseInt(String(S.co.prevShares||S.co.shares||'0').replace(/,/g,''),10)||0;
  // KPI auto-calc
  const safeDiv=(a,b,pct=false)=>b?Math.round(a/b*(pct?1000:100))/((pct?10:100)):null;
  const curEps=shares?Math.round(curNet/shares*100)/100:null;
  const prevEps=prevSharesN&&hasPrev?Math.round(prevNet/prevSharesN*100)/100:null;
  const curBps=shares?Math.round(curBS.bsNA/shares*100)/100:null;
  const prevBps=prevSharesN&&hasPrev?Math.round(prevBS.bsNA/prevSharesN*100)/100:null;
  const curEqRatio=curBS.bsTA?safeDiv(curBS.bsNA,curBS.bsTA,true):null;
  const prevEqRatio=prevBS.bsTA?safeDiv(prevBS.bsNA,prevBS.bsTA,true):null;
  const curRoe=(()=>{
    const avgNA=hasPrev?(curBS.bsNA+prevBS.bsNA)/2:curBS.bsNA;
    return avgNA?safeDiv(curNet,avgNA,true):null;
  })();
  const prevRoe=(()=>{
    if(!hasPrev)return null;
    const p2=S.prev2||{};
    const prev2NA=isC?num(p2.cbsNA||'0'):num(p2.bsNA||'0');
    const avgNA=prev2NA?(prevBS.bsNA+prev2NA)/2:prevBS.bsNA;
    return avgNA?safeDiv(prevNet,avgNA,true):null;
  })();
  const curRoa=(()=>{
    const avgTA=hasPrev?(curBS.bsTA+prevBS.bsTA)/2:curBS.bsTA;
    return avgTA?safeDiv(curNet,avgTA,true):null;
  })();
  const prevRoa=(()=>{
    if(!hasPrev)return null;
    const p2=S.prev2||{};
    const prev2TA=isC?num(p2.cbsTA||'0'):num(p2.bsTA||'0');
    const avgTA=prev2TA?(prevBS.bsTA+prev2TA)/2:prevBS.bsTA;
    return avgTA?safeDiv(prevNet,avgTA,true):null;
  })();
  // 配当per share from notes sec5
  const extractDiv=(notes)=>{
    if(!notes)return null;
    // 新形式: noteItems内のisDividendアイテム
    if(notes.noteItems){
      for(const item of notes.noteItems){
        if(!item.isDividend) continue;
        for(const di of (item.divItems||[])){
          if(di.rows){for(const r of di.rows){if(r.perShare)return r.perShare;}}
        }
      }
    }
    // 旧形式フォールバック
    if(notes.sec5Items){
      for(const item of notes.sec5Items){
        if(item.rows){for(const r of item.rows){if(r.perShare)return r.perShare;}}

  };
  const curDiv=extractDiv(isC?S.cnotes:S.notes);

  return {
    isC, hasPrev,

function _compareHelper(prevData,curData,stmtFilter,isC){
  const acctsRaw=S.accounts.filter(a=>a.stmt===stmtFilter);
  const curM=computeFS(curData);
  const hasPrev=Object.keys(prevData).length>0;
  const prevM=hasPrev?computeFS(prevData):{};
  const accts=_filterZeroCompare(acctsRaw,curM,prevM);
  const rows=[];
  accts.forEach(a=>{
    const sid=String(a.id);
    if(a.type==='header'){rows.push({type:'header',name:a.name});return;}
    const cur=curM[sid]||0;
    const prev=hasPrev?(prevM[sid]||0):null;
    const diff=prev!==null?cur-prev:null;
    const ratio=diff!==null&&prev!==0?(diff/Math.abs(prev)*100).toFixed(1)+'%':'—';
    const isBold=a.type==='subtotal'||a.type==='total'||a.type==='calc';
    rows.push({type:'data',name:a.name,cur,prev,diff,ratio,bold:isBold,deduct:a.deduct});
  });
  return rows;
}

function _compareFSTable(rows,title,period,unit){
  let h='';
  rows.forEach(r=>{
    if(r.type==='header'){
      h+=`<tr><td colspan="4" style="font-size:11px;font-weight:700;color:#3d5499;padding:6px 12px 2px;background:#f5f7ff">${esc(r.name)}</td></tr>`;
    } else {
      const cls=r.bold?'b bt':'';
      const indent=r.bold?'':'i1';
      const color=r.diff!==null&&r.diff<0?'color:#c0392b':'';
      const fmtV=v=>{if(v===null)return '—';return r.deduct?fmtSK(v):fmtK(v);};
      h+=`<tr><td class="${indent} ${cls}">${esc(r.name)}</td>
        <td class="r ${cls}">${fmtV(r.prev)}</td><td class="r ${cls}">${fmtV(r.cur)}</td>
        <td class="r ${cls}" style="${color}">${r.ratio}</td></tr>`;
    }
  });
  return `<table class="ft-fin" style="width:100%"><thead><tr>
    <th>科目</th><th style="text-align:right;width:18%">前期</th><th style="text-align:right;width:18%">当期</th>
    <th style="text-align:right;width:12%">増減率</th>
  </tr></thead><tbody>${h}</tbody></table>`;
}

function _compareBSSide(prevData,curData,isC){
  const keepBS=isC?new Set(['tot_CBS_A','tot_CBS_LE']):new Set(['tot_A','tot_LE']);
  let {assetAccts,liabAccts}=_bsSplitAccts(isC);
  const curM=computeFS(curData);
  const hasPrev=Object.keys(prevData).length>0;
  const prevM=hasPrev?computeFS(prevData):{};
  assetAccts=_filterZeroCompare(assetAccts,curM,prevM,keepBS);
  liabAccts=_filterZeroCompare(liabAccts,curM,prevM,keepBS);
  const mkRow=(a)=>{
    const sid=String(a.id);
    if(a.type==='header') return {type:'header',name:a.name};
    const cur=curM[sid]||0;
    const prev=hasPrev?(prevM[sid]||0):null;
    const diff=prev!==null?cur-prev:null;
    const ratio=diff!==null&&prev!==0?(diff/Math.abs(prev)*100).toFixed(1)+'%':'—';
    const isBold=a.type==='subtotal'||a.type==='total'||a.type==='calc';
    return {type:'data',name:a.name,cur,prev,diff,ratio,bold:isBold,deduct:a.deduct,id:a.id};
  };
  return {assetRows:assetAccts.map(mkRow),liabRows:liabAccts.map(mkRow)};
}

function _compareCFRows(prevD,curD,prevPre,curPre,isC){

  const stmtType=isC?'CCF':'CF';
  const curC=calcCF(curD,curPre,stmtType);
  const hp=Object.keys(prevD).length>0;
  const prevC=hp?calcCF(prevD,prevPre,stmtType):{map:{}};
  const curM=curC.map||{};
  const prevM=prevC.map||{};
  const fC=v=>v===null?'—':fmtCFK(v);
  const mkR=(label,cur,prev,bold=false,indent=true)=>{
    const cls=bold?'b bt':'';const ic=indent&&!bold?'i1':'';
    let ratioStr='—',color='';
    if(prev!==null){
      const diff=cur-prev;color=diff<0?'color:#c0392b':'';
      ratioStr=prev!==0?(diff/Math.abs(prev)*100).toFixed(1)+'%':'—';
    }
    return `<tr><td class="${ic} ${cls}">${esc(label)}</td><td class="r ${cls}">${fC(prev)}</td><td class="r ${cls}">${fC(cur)}</td>
      <td class="r ${cls}" style="${color}">${ratioStr}</td></tr>`;
  };
  const pre=isC?'ccf':'cf';

function _usd(jpy){
  const rate=parseFloat(S.co.usdRate)||150;
  if(!jpy&&jpy!==0)return '—';
  const k=Math.trunc(jpy/1000);
  return Math.round(k/rate).toLocaleString('en-US');
}
function _fmtEN(v){if(!v&&v!==0)return '—';const k=Math.trunc(parseInt(v)/1000);return k.toLocaleString('en-US');}
function _dateEN(jp){
  const m=String(jp||'').match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if(!m)return jp||'';
  const months=['','January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${months[parseInt(m[2])]||m[2]} ${parseInt(m[3])}, ${m[1]}`;
}
function _periodEN(){return `${_dateEN(S.co.from)} - ${_dateEN(S.co.to)}`;}
function _asOfEN(){return `As of ${_dateEN(S.co.to)}`;}
function _DHEN(){return `<div class="dp">${esc(S.co.nameEN||S.co.name)}</div>`;}

  const prompt='Please translate the following Japanese business report section into British English. Use formal business English appropriate for an annual report or disclosure document. Maintain the structure and paragraph breaks. Output ONLY the translation.\n\n'+jpContent;
  navigator.clipboard.writeText(prompt).then(()=>{
    showToast('✅ クリップボードにコピーしました — Claude等に貼り付けて翻訳してください');
  }).catch(()=>{
    const ta=document.createElement('textarea');
    ta.value=prompt;ta.style.cssText='position:fixed;left:-9999px';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    showToast('✅ コピーしました');
  });
}

// ── EN EQ (Statement of Changes in Equity) — JPY table + USD table ──
function _enEqTableHtml(eqDef,m,convertFn,unit){
  const {cols,rows}=eqDef;
  const hdr=eqHeaderRows(cols);
  const _en=n=>EN_NAME[n]||EN_NAME[(n||'').trim()]||n;
  const _enR=n=>EN_NAME[n]||EN_NAME[(n||'').trim()]||n;
  const thBase='padding:4px 3px;font-size:8px;text-align:center;line-height:1.15;border:1px solid #d0d4de;background:#1a2744;color:#fff;max-width:85px;word-wrap:break-word;overflow-wrap:break-word';
  let h=`<table class="ft-fin eq-tbl" style="width:100%;table-layout:auto;font-size:10px;border-collapse:collapse"><thead>`;
  h+=`<tr><th style="${thBase};min-width:100px;max-width:150px" rowspan="3">Item</th>`;
  h+=hdr.groups.map(g=>`<th style="${thBase}" colspan="${g.span}">${esc(_en(g.name))}</th>`).join('')+'</tr>';
  h+=`<tr>${hdr.subs.map(s=>{
    if(!s.hasSub)return `<th style="${thBase}" rowspan="2">${esc(_en(s.name))}</th>`;
    return `<th style="${thBase}" colspan="${s.span}">${esc(_en(s.name))}</th>`;
  }).join('')}</tr>`;
  h+=`<tr>${hdr.leafs.filter(l=>l.hasSub).map(l=>`<th style="${thBase}">${esc(_en(l.name))}</th>`).join('')}</tr>`;
  h+=`</thead><tbody>`;
  const colBdr='border-right:1px solid #dde0e8;';
  rows.forEach(r=>{
    if(r.isHeader){
      h+=`<tr><td style="font-size:9px;font-weight:700;color:#3d5499;padding:3px 6px;border-bottom:none;${colBdr}">${esc(_enR(r.label))}</td>`;
      cols.forEach(()=>{h+=`<td style="border-bottom:none;${colBdr}"></td>`;});
      h+=`</tr>`;return;
    }
    const isCalc=!!r.isCalc;
    const isClose=r.isCalc==='close';
    const cls=isCalc||r.key==='opening'?'font-weight:700;':'';
    const bt=isClose?'border-top:2px solid #1a2744;border-bottom:2px solid #1a2744;':r.isCalc?'border-top:2px solid #1a2744;':r.key==='opening'?'border-bottom:2px solid #1a2744;':'';
    const bgSt=isClose?'background:#eef2ff;':'';
    h+=`<tr style="${bgSt}"><td style="padding:3px 6px;font-size:9px;max-width:150px;line-height:1.2;${cls}${bt}${colBdr}">${esc(_enR(r.label))}</td>`;
    cols.forEach(c=>{
      const v=m[r.key]?.[c.key]||0;
      h+=`<td style="text-align:right;font-size:10px;white-space:nowrap;padding:3px 3px;${cls}${bt}${colBdr}">${v?convertFn(v):''}</td>`;
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table>`;
  return h;
}

function odStart(e,i){_dragSrc=i;e.dataTransfer.effectAllowed='move';e.currentTarget.classList.add('dnd-drag');}
function odOver(e){e.preventDefault();return false;}
function odEnter(e,el){if(_dragSrc>=0)el.classList.add('dnd-over');}
function odLeave(e,el){el.classList.remove('dnd-over');}
function odDrop(e,i){
  e.preventDefault();e.currentTarget.classList.remove('dnd-over');
  if(_dragSrc<0||_dragSrc===i){_dragSrc=-1;return;}
  const[x]=curP().docOrder.splice(_dragSrc,1);curP().docOrder.splice(i,0,x);
  _dragSrc=-1;renderContent();
}
function odEnd(e,el){el.classList.remove('dnd-drag');_dragSrc=-1;}

  if(!S.accounts||!S.accounts.length)return;

  S.accounts.forEach(a=>{
    if(a.cat==='CF_OP') a.cat='CF_OP1';
    if(a.cat==='CCF_OP') a.cat='CCF_OP1';
  });

  // --- EQ/CEQ: 旧→新eq_col/eq_row ---
  const hasNewEQ=S.accounts.some(a=>a.stmt==='EQ'&&a.type==='eq_col');
  if(!hasNewEQ){
    // 旧EQ/CEQエントリを全削除
    S.accounts=S.accounts.filter(a=>a.stmt!=='EQ'&&a.stmt!=='CEQ');
    // 旧eqDef.colsがあればそこから構築、なければデフォルト注入

      const pre=stKey==='ceq'?'ceq_c_':'eq_c_';
      const rPre=stKey==='ceq'?'ceq_r_':'eq_r_';
      const isC=stKey==='ceq';
      const d=S[stKey];
      const oldDef=d&&d.eqDef;
      if(oldDef&&oldDef.cols&&oldDef.cols.length){
        // 旧eqDef.colsからeq_colエントリを生成
        oldDef.cols.forEach(c=>{
          const newId=pre+c.key;
          const entry={id:newId,name:c.name,type:'eq_col',stmt:st};
          if(c.group)entry.group=c.group;
          if(c.sub)entry.sub=c.sub;
          if(c.sub2)entry.sub2=c.sub2;
          if(c.calc&&c.calc.length)entry.calc=c.calc.map(k=>pre+k);

  S.accounts.forEach(a=>{
