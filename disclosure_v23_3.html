// 起動時・インポート時の旧形式マイグレーション
function migrateOldFsFormat(){
  // ▼ v12.0: マスタaccounts配列の旧形式検出→新形式注入
  _migrateAccountsMaster();
  // ▼ v11.0: 千円→円マイグレーション
  if(!S.unitVersion||S.unitVersion<11){
    const _migrateFS=obj=>{
      for(const [k,v] of Object.entries(obj)){
        if(typeof v==='string'||typeof v==='number'){
          const n=num(v);if(n!==0)obj[k]=String(n*1000);
        }
      }
    };
    ['bs','cbs','pl','cpl','cf','ccf'].forEach(k=>{if(S[k])_migrateFS(S[k]);});
    ['prev_bs','prev_cbs','prev_pl','prev_cpl','prev_cf','prev_ccf'].forEach(k=>{if(S[k])_migrateFS(S[k]);});
    ['eq','ceq','prev_eq','prev_ceq'].forEach(k=>{
      if(!S[k])return;const d=S[k];
      ['prevCapital','prevSurplus','prevRetained','prevMinority','dividends','netIncomeEq','minorityNetInc'].forEach(f=>{
        if(d[f]){const n=num(d[f]);if(n!==0)d[f]=String(n*1000);}
      });
      if(d.eqDef&&d.eqDef.data){
        for(const rKey of Object.keys(d.eqDef.data)){
          const row=d.eqDef.data[rKey];
          for(const cKey of Object.keys(row)){
            const n=num(row[cKey]);if(n!==0)row[cKey]=String(n*1000);
          }
        }
      }
      if(d.data&&typeof d.data==='object'&&!Array.isArray(d.data)){
        for(const rKey of Object.keys(d.data)){
          if(typeof d.data[rKey]==='object'){
            const row=d.data[rKey];
            for(const cKey of Object.keys(row)){
              const n=num(row[cKey]);if(n!==0)row[cKey]=String(n*1000);
            }
          }
        }
      }
    });
    if(S.prev2){['cbsNA','cbsTA','bsNA','bsTA'].forEach(k=>{
      if(S.prev2[k]){const n=num(S.prev2[k]);if(n!==0)S.prev2[k]=String(n*1000);}
    });}
    S.unitVersion=11;
    showToast('📐 v11.0: データを円単位に自動変換しました');
  }

  // ▼ 過去のセーブデータの minority 旧キーを新マスタIDにスライド
  if(S.cbs.minority!==undefined){S.cbs.cbs_18=S.cbs.minority; delete S.cbs.minority;}
  if(S.cpl.minorityInterest!==undefined){S.cpl.cpl_minority=S.cpl.minorityInterest; delete S.cpl.minorityInterest;}
  if(S.pl.minorityInterest!==undefined) delete S.pl.minorityInterest;

  // docOrder migration: old IDs → new IDs
  const DOC_ID_MIGRATE={'business':'business_full','summary':'summary_c',
    'en_consolidated':'en_cbs','en_cf_s':'en_cf'};
  Object.values(S.purposes||{}).forEach(p=>{
    if(p.docOrder)p.docOrder=p.docOrder.map(id=>DOC_ID_MIGRATE[id]||id);
  });
  // ▼ v11.1: S.cbs/prev_cbs の旧BSキー→CBSマスタIDマイグレーション
  const _CBS_KEY_MAP={1:'cbs_01',2:'cbs_02',3:'cbs_03',4:'cbs_04',
    5:'cbs_fa_01',6:'cbs_fa_03',7:'cbs_fa_06',8:'cbs_08',
    9:'cbs_09',10:'cbs_10',11:'cbs_11',12:'cbs_12',13:'cbs_13',
    14:'cbs_14',17:'cbs_17',
    'bs_fa_01':'cbs_fa_01','bs_fa_02':'cbs_fa_02','bs_fa_03':'cbs_fa_03',
    'bs_fa_04':'cbs_fa_04','bs_fa_05':'cbs_fa_05','bs_fa_06':'cbs_fa_06','bs_fa_07':'cbs_fa_07',
    'bs_na_01':'cbs_16','bs_na_02':'cbs_16','bs_na_03':'cbs_16',
    15:'cbs_16',16:'cbs_16'};
  const _migrateCbsKeys=obj=>{
    if(!obj)return;
    // 旧BSキーが含まれているか検出（cbs_で始まるキーがメインならスキップ）
    const keys=Object.keys(obj);
    const hasBsKeys=keys.some(k=>/^\d+$/.test(String(k))&&_CBS_KEY_MAP[parseInt(k)]);
    if(!hasBsKeys)return;
    for(const [oldK,newK] of Object.entries(_CBS_KEY_MAP)){
      const k=typeof oldK==='string'&&/^\d+$/.test(oldK)?parseInt(oldK):oldK;
      if(obj[k]!==undefined&&obj[newK]===undefined){obj[newK]=obj[k];delete obj[k];}
      else if(obj[k]!==undefined){delete obj[k];}
    }
  };
  _migrateCbsKeys(S.cbs);
  _migrateCbsKeys(S.prev_cbs);

  // ▼ v11.2: CF/CCF 旧英語キー→マスタIDマイグレーション
  const _CF_KEY_MAP={
    depreciation:'_02',allowanceChange:'_03',arChange:'_04',inventoryChange:'_05',
    apChange:'_06',otherOpCF:'_07',interestPaid:'_09',taxPaid:'_10',
    capexPurchase:'_11',capexSale:'_12',investPurchase:'_13',otherInvCF:'_14',
    stBorrowingNet:'_15',ltBorrowing:'_16',ltRepayment:'_17',dividendsPaid:'_18',otherFinCF:'_19',
    openingCash:'_20'
  };
  const _migrateCfKeys=(obj,pre)=>{
    if(!obj)return;
    const hasOld=Object.keys(obj).some(k=>_CF_KEY_MAP[k]);
    if(!hasOld)return;
    // interestReceived + dividendReceived → _08 (合算)
    if(obj.interestReceived!==undefined||obj.dividendReceived!==undefined){
      const combined=sumN(obj.interestReceived,obj.dividendReceived);
      if(combined!==0&&obj[pre+'_08']===undefined) obj[pre+'_08']=String(combined);
      delete obj.interestReceived; delete obj.dividendReceived;
    }
    if(obj.exchangeDiff!==undefined){
      if(obj[pre+'_exch']===undefined) obj[pre+'_exch']=obj.exchangeDiff;
      delete obj.exchangeDiff;
    }
    for(const [oldK,suffix] of Object.entries(_CF_KEY_MAP)){
      const newK=pre+suffix;
      if(obj[oldK]!==undefined&&obj[newK]===undefined){obj[newK]=obj[oldK];delete obj[oldK];}
      else if(obj[oldK]!==undefined){delete obj[oldK];}
    }
  };
  _migrateCfKeys(S.ccf,'ccf'); _migrateCfKeys(S.cf,'cf');
  _migrateCfKeys(S.prev_ccf,'ccf'); _migrateCfKeys(S.prev_cf,'cf');

  // ▼ BS固定資産・純資産の旧ID→新IDマイグレーション
  ['bs','cbs'].forEach(k=>{
    const d=S[k];
    // FA: 5→bs_fa_01(有形固定), 6→bs_fa_03(無形/SW), 7→bs_fa_06(投資有価証券)
    const pre=k==='cbs'?'cbs_fa_':'bs_fa_';
    if(d[5]!==undefined&&d[pre+'01']===undefined){d[pre+'01']=d[5];delete d[5];}
    if(d[6]!==undefined&&d[pre+'03']===undefined){d[pre+'03']=d[6];delete d[6];}
    if(d[7]!==undefined&&d[pre+'06']===undefined){d[pre+'06']=d[7];delete d[7];}
    // CBS旧キー: cbs_05→cbs_fa_01, cbs_06→cbs_fa_03, cbs_07→cbs_fa_06
    if(k==='cbs'){
      if(d.cbs_05!==undefined&&d.cbs_fa_01===undefined){d.cbs_fa_01=d.cbs_05;delete d.cbs_05;}
      if(d.cbs_06!==undefined&&d.cbs_fa_03===undefined){d.cbs_fa_03=d.cbs_06;delete d.cbs_06;}
      if(d.cbs_07!==undefined&&d.cbs_fa_06===undefined){d.cbs_fa_06=d.cbs_07;delete d.cbs_07;}
      // cbs_15(旧資本剰余金)を削除（連結はBS上は表示しない）
      if(d.cbs_15!==undefined)delete d.cbs_15;
    }
  });
  // BS NA: 15(資本剰余金)→削除, 16(利益剰余金)→bs_na_03(繰越利益剰余金)
  if(S.bs[15]!==undefined)delete S.bs[15];
  if(S.bs[16]!==undefined&&S.bs.bs_na_03===undefined){S.bs.bs_na_03=S.bs[16];delete S.bs[16];}

  // ▼ 事業報告書(4)営業所テーブルの旧4列→新2列+extraFieldsマイグレーション
  const sec1=S.br&&S.br.items&&S.br.items.find(s=>s.key==='sec1');
  if(sec1){
    const off=sec1.subs&&sec1.subs.find(s=>s.key==='offices');
    if(off&&off.tableHeaders&&off.tableHeaders.length>=4&&!off.extraFields){
      off.extraFields={avgAge:'',avgTenure:''};
      off.tableHeaders=['営業所','従業員数'];
      if(off.tableRows)off.tableRows.forEach(r=>{if(r.cells)r.cells=r.cells.slice(0,2);});
    }
    // shares に totalRow がなければ追加
    const sh=sec1.subs&&sec1.subs.find(s=>s.key==='shares');
    if(sh&&sh.tableMode&&!sh.totalRow)sh.totalRow=true;
    // officers に colWidths がなければ追加
    const off2=sec1.subs&&sec1.subs.find(s=>s.key==='officers');
    if(off2&&off2.tableMode&&!off2.colWidths)off2.colWidths=['110px','110px'];
  }

  // 旧S.bs: {cash, ar, ...} → 新: {1:..., 2:...}
  const LEGACY_BS={cash:1,ar:2,inventory:3,otherCA:4,tangible:5,intangible:6,investments:7,deferred:8,
    ap:9,stDebt:10,otherCL:11,ltDebt:12,otherLL:13,
    capital:14,capitalSurplus:15,retainedEarnings:16,treasuryStock:17};
  const LEGACY_PL={sales:18,cogs:19,sga:20,opOther:21,opOtherExp:22,extraOrdInc:23,extraOrdLoss:24};
  ['bs','cbs'].forEach(key=>{
    const d=S[key];
    if(d.cash!==undefined){
      Object.entries(LEGACY_BS).forEach(([f,id])=>{if(d[f]!==undefined){d[id]=d[f];delete d[f];}});
    }
    ['nonOpInc','nonOpExp','tangible','intangible','investments','otherCA','ar','inventory',
     'cash','capital','capitalSurplus','retainedEarnings','treasuryStock','ap','stDebt','otherCL',
     'ltDebt','otherLL','deferred'].forEach(f=>delete d[f]);
  });
  ['pl','cpl'].forEach(key=>{
    const d=S[key];
    if(d.sales!==undefined){
      Object.entries(LEGACY_PL).forEach(([f,id])=>{if(d[f]!==undefined){d[id]=d[f];delete d[f];}});
    }
    ['sales','cogs','sga','opOther','opOtherExp','nonOpInc','nonOpExp','extraOrdInc','extraOrdLoss'].forEach(f=>delete d[f]);
  });
  // 旧PL_CAT_MIGRATE
  S.accounts.forEach(a=>{
    if(PL_CAT_MIGRATE[a.cat]) a.cat=PL_CAT_MIGRATE[a.cat];
    if(!a.type) a.type='item';
    if(!a.stmt){
      a.stmt=a.cat&&(a.cat.startsWith('CA')||a.cat.startsWith('FA')||a.cat.startsWith('DEF')||
        a.cat.startsWith('CL')||a.cat.startsWith('LL')||a.cat.startsWith('NA'))?'BS':
        a.cat&&(a.cat.startsWith('REV')||a.cat.startsWith('COGS')||a.cat.startsWith('SGA')||
        a.cat.startsWith('OPI')||a.cat.startsWith('OPE')||a.cat.startsWith('EI')||a.cat.startsWith('EL'))?'PL':'BS';
    }
    if(a.deduct===undefined) a.deduct=false;
  });
  // 注記: 旧フラット形式→新items配列マイグレーション
  ['notes','cnotes'].forEach(key=>{
    migrateNotesToItems(key);
  });
  // v23.2: 旧cover→cover_reportに変換
  Object.values(S.purposes||{}).forEach(p=>{
    if(p.docOrder){
      p.docOrder=p.docOrder.map(id=>id==='cover'?'cover_report':id);
    }
  });
  // v23.2: 招集ご通知データ初期化
  if(!S.shoshu) S.shoshu={date:'',greeting:'',body:'',closing:'敬具',meetingDate:'',meetingPlace:'',agenda:[],footer:'以　上',sanko:[]};
  // v23.2: 中期計画・事業別概況
  if(!S.mtplan) S.mtplan={title:'中期経営計画',years:['2026.3','2027.3','2028.3','2029.3','2030.3'],actualIdx:0,group:{revenue:['','','','',''],opProfit:['','','','',''],ordProfit:['','','','','']},segData:[],narratives:{overview:'',group:'',segments:'',composition:''}};
  if(!S.segOverview) S.segOverview={title:'事業別概況',sections:[]};
}

function exportCSV(){
  const bom='\uFEFF';
  const hdr='コード,科目名,区分\n';
  const rows=S.accounts.map(a=>[a.code,a.name,a.cat].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([bom+hdr+rows],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='勘定科目マスタ.csv';a.click();URL.revokeObjectURL(a.href);
  showToast('✅ CSVエクスポート完了！');
}
function importCSV(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    const text=e.target.result.replace(/^\uFEFF/,'');
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    const parseRow=line=>{
      const res=[];let inQ=false,f='';
      for(let i=0;i<line.length;i++){const c=line[i];
        if(c==='"'){if(inQ&&line[i+1]==='"'){f+='"';i++;}else inQ=!inQ;}
        else if(c===','&&!inQ){res.push(f);f='';}else f+=c;}
      res.push(f);return res;};
    const newAcc=[];
    for(let i=1;i<lines.length;i++){const p=parseRow(lines[i]);if(p.length>=3)newAcc.push({id:NID++,code:p[0].trim(),name:p[1].trim(),cat:p[2].trim()});}
    S.accounts=newAcc;showToast(`✅ ${newAcc.length}件インポート完了！`);renderContent();
  };
  r.readAsText(file,'utf-8');input.value='';
}

  try{

    const zipFiles=await unzipOfficeXml(buf);
    const readXml=name=>{const data=zipFiles[name]||zipFiles[name.replace(/^\//,'')];return data?new TextDecoder().decode(data):null;};
    const sharedXml=readXml('xl/sharedStrings.xml')||'';
    const shared=[];{
      const re=/<si[^>]*>([\s\S]*?)<\/si>/g; let m;
      while((m=re.exec(sharedXml))!==null){
        const si=m[1].replace(/<rPh[\s\S]*?<\/rPh>/g,'').replace(/<phoneticPr[^/]*\/>/g,'');
        const parts=[...si.matchAll(/<t[^>]*>([\s\S]*?)<\/t>/g)].map(x=>x[1]);
        const raw=(parts.length?parts.join(''):si).replace(/<[^>]+>/g,'');
        shared.push(raw.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'"));
      }
    }
    const getCells=xmlStr=>{
      if(!xmlStr)return {};
      const cells={};
      const re=/<c r="([A-Z]+\d+)"([^>]*)>([\s\S]*?)<\/c>/g; let m;
      while((m=re.exec(xmlStr))!==null){
        const ref=m[1], attrs=m[2]||'', inner=m[3]||'';
        let val='';
        if(/t="inlineStr"/.test(attrs)){
          const parts=[...inner.matchAll(/<t[^>]*>([\s\S]*?)<\/t>/g)].map(x=>x[1]);
          val=(parts.length?parts.join(''):'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'");
        }else{
          const vm=inner.match(/<v>([\s\S]*?)<\/v>/);
          if(vm) val=vm[1];
          if(/t="s"/.test(attrs)){
            const idx=parseInt(val,10);
            val=Number.isFinite(idx)&&shared[idx]!==undefined?shared[idx]:'';
          }
        }
        cells[ref]=val||'';
      }
      return cells;
    };
    const wbXml=readXml('xl/workbook.xml')||'';
    const sheetNames=[];const snRe=/<sheet name="([^"]*)"[^/]*\/>/g;let snM;
    while((snM=snRe.exec(wbXml))!==null)sheetNames.push(snM[1].replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>'));
    const tabNameToStmt={};ACC_TABS.forEach(t=>tabNameToStmt[t.label]=t.id);
    const newAccounts=[];let importCount=0;let maxNumericId=0;
    sheetNames.forEach((sn,si)=>{
      const stmtId=tabNameToStmt[sn];if(!stmtId)return;
      const cells=getCells(readXml(`xl/worksheets/sheet${si+1}.xml`));
      // 列: A=ID B=コード C=科目名 D=EN Name E=カテゴリ F=種別 G=集計/計算式
      // (旧形式: A=ID B=コード C=科目名 D=カテゴリ E=種別 F=集計/計算式)
      const hasENCol=(cells['D1']||'').includes('EN');
      let r=2;
      while(cells[`C${r}`]!==undefined && cells[`C${r}`]!==''){
        const rawId=String(cells[`A${r}`]||'').trim();
        const code=cells[`B${r}`]||'';
        let name=cells[`C${r}`]||'';
        let nameEN='',catRaw='',typeRaw='',extra='';
        if(hasENCol){
          nameEN=cells[`D${r}`]||'';
          catRaw=cells[`E${r}`]||'';
          typeRaw=cells[`F${r}`]||'入力項目';
          extra=cells[`G${r}`]||'';
        } else {
          catRaw=cells[`D${r}`]||'';
          typeRaw=cells[`E${r}`]||'入力項目';
          extra=cells[`F${r}`]||'';
        }
        if(name==='（科目なし）'){r++;continue;}
        const deduct=name.includes('（△）');
        if(deduct) name=name.replace(/\s*（△）/,'').trim();
        const cat=catRaw.split(' ')[0]||'';
        const type=JP_TYPE[typeRaw]||'item';
        const numericId=/^\d+$/.test(rawId)?parseInt(rawId,10):null;
        if(numericId!==null && numericId>maxNumericId) maxNumericId=numericId;
        const acc={id:rawId||NID++,code,name,nameEN:nameEN||'',type,stmt:stmtId,cat,deduct};
        if(type==='total')acc.sumOf=extra?extra.split(',').map(s=>s.trim()).filter(Boolean):[];
        if(type==='calc')acc.formula=extra||'0';
        // EQ列: extra = group|sub|sub2|calc
        if(type==='eq_col'&&extra){
          const parts=extra.split('|');
          if(parts[0])acc.group=parts[0];
          if(parts[1])acc.sub=parts[1];
          if(parts[2])acc.sub2=parts[2];
          if(parts[3])acc.calc=parts[3].split(',').map(s=>s.trim()).filter(Boolean);
        }
        if(type==='eq_row_calc')acc.isCalc=extra||'sum';
        newAccounts.push(acc);importCount++;r++;
      }
    });
    if(newAccounts.length>0){
      S.accounts=newAccounts;
      if(maxNumericId>=NID) NID=maxNumericId+1;
      accApply();
      _migrateAccountsMaster(); // EQ group/sub補完等のマイグレーション実行
      showToast(`✅ 勘定科目マスタ ${importCount}件インポート完了！`);
      renderContent();
    }
    else{showToast('⚠ インポートする科目が見つかりませんでした');}
  }catch(e){showToast('❌ Excelの読み込みに失敗: '+e.message);console.error(e);}
}

// ── CRC32 ──────────────────────────────────────────────────────
const CRC32_TABLE=(()=>{const t=new Uint32Array(256);for(let i=0;i<256;i++){let c=i;for(let j=0;j<8;j++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[i]=c;}return t;})();
function crc32(buf){let c=0xFFFFFFFF;for(let i=0;i<buf.length;i++)c=CRC32_TABLE[(c^buf[i])&0xFF]^(c>>>8);return(c^0xFFFFFFFF)>>>0;}
function utf8(str){return new TextEncoder().encode(str);}
function writeU16(v){return[(v)&0xFF,(v>>8)&0xFF];}
function writeU32(v){return[(v)&0xFF,(v>>8)&0xFF,(v>>16)&0xFF,(v>>24)&0xFF];}

function buildZip(files){
  const parts=[];const cdEntries=[];let offset=0;
  for(const {name,data} of files){
    const namB=utf8(name);const crc=crc32(data);const sz=data.length;
    const lh=new Uint8Array([0x50,0x4B,0x03,0x04,20,0,0,8,0,0,0x65,0x54,0,0,...writeU32(crc),...writeU32(sz),...writeU32(sz),...writeU16(namB.length),...writeU16(0)]);
    cdEntries.push(new Uint8Array([0x50,0x4B,0x01,0x02,20,0,20,0,0,8,0,0,0x65,0x54,0,0,...writeU32(crc),...writeU32(sz),...writeU32(sz),...writeU16(namB.length),...writeU16(0),...writeU16(0),...writeU16(0),...writeU16(0),...writeU32(0),...writeU32(offset)]));
    cdEntries.push(namB);
    parts.push(lh,namB,data);
    offset+=lh.length+namB.length+sz;
  }
  const cdStart=offset;
  const cdSize=cdEntries.reduce((s,b)=>s+b.length,0);
  const eocd=new Uint8Array([0x50,0x4B,0x05,0x06,0,0,0,0,...writeU16(files.length),...writeU16(files.length),...writeU32(cdSize),...writeU32(cdStart),0,0]);
  const totalLen=[...parts,...cdEntries,eocd].reduce((s,b)=>s+b.length,0);
  const out=new Uint8Array(totalLen);let pos=0;
  for(const p of [...parts,...cdEntries,eocd]){out.set(p,pos);pos+=p.length;}
  return out;
}

function exportExcel(){
  const xe=v=>String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const cl=n=>{let s='';let c=n;while(c>0){s=String.fromCharCode(65+((c-1)%26))+s;c=Math.floor((c-1)/26);}return s;};
  const ref=(col,row)=>`${cl(col)}${row}`;
  const cStr=(col,row,val,s='')=>{const r=ref(col,row);const st=s?` s="${s}"`:'';return`<c r="${r}"${st} t="inlineStr"><is><t>${xe(String(val??''))}</t></is></c>`;};
  const cNum=(col,row,val,s='2')=>{const r=ref(col,row);const n=parseInt(String(val??'').replace(/,/g,''),10);if(isNaN(n))return`<c r="${r}" t="inlineStr"><is><t></t></is></c>`;return`<c r="${r}" s="${s}"><v>${n}</v></c>`;};
  const cFormula=(col,row,formula,cached,s='2')=>{const r=ref(col,row);const cv=String(parseInt(String(cached??'').replace(/,/g,''),10)||0);return`<c r="${r}" s="${s}"><f>${xe(formula)}</f><v>${cv}</v></c>`;};
  const hRow=(rowN,...cols)=>`<row r="${rowN}">${cols.map((v,i)=>cStr(i+1,rowN,v,'1')).join('')}</row>`;
  const dRow=(rowN,...vals)=>`<row r="${rowN}">${vals.map((v,i)=>{
    if(v===''||v===null||v===undefined)return`<c r="${ref(i+1,rowN)}" t="inlineStr"><is><t></t></is></c>`;
    const isNum=typeof v==='number'||(typeof v==='string'&&/^-?[\d,]+$/.test(v.trim())&&v.trim()!=='');
    return isNum?cNum(i+1,rowN,v):cStr(i+1,rowN,v);
  }).join('')}</row>`;
  const wsXml=(sheetData,colWidths='')=>`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
${colWidths}<sheetData>${sheetData}</sheetData></worksheet>`;
  const colDefs=(widths)=>`<cols>${widths.map((w,i)=>`<col min="${i+1}" max="${i+1}" width="${w}" customWidth="1"/>`).join('')}</cols>`;

  // ═══ 3列FS出力ヘルパー (科目コード | 勘定科目名 | 金額) ═══
  // BS/PL: accountsマスタから構築、計算行はExcel数式
  const sheetFSFromAccounts=(d,stmtFilter,sheetLabel,isC=false)=>{
    const m=computeFS(d);
    const accts=S.accounts.filter(a=>a.stmt===stmtFilter);
    let r=1; const rows=[]; const mapping=[];
    rows.push(hRow(r++,'科目コード','勘定科目名','金額（円）'));
    // rowRef: id→Excel行番号
    const rowRef={};
    accts.forEach(a=>{
      const sid=String(a.id);
      switch(a.type){
        case 'header':
          rows.push(`<row r="${r}">${cStr(1,r,'')}${cStr(2,r,a.name,'3')}${cStr(3,r,'')}</row>`);
          r++; break;
        case 'item':{
          const raw=d[a.id]||d[sid]||'';
          const val=a.deduct?-num(raw):num(raw);
          rows.push(`<row r="${r}">${cStr(1,r,a.code||'')}${cStr(2,r,a.name)}${cNum(3,r,val)}</row>`);
          mapping.push({row:r,id:a.id,deduct:a.deduct});
          rowRef[sid]=r; r++; break;
        }
        case 'subtotal':{
          // SUM of same-cat items
          const catItems=accts.filter(x=>x.type==='item'&&x.cat===a.cat);
          const refs=catItems.map(x=>rowRef[String(x.id)]).filter(Boolean);
          const formula=refs.length?refs.map(rr=>`C${rr}`).join('+'):'0';
          const val=m[sid]||0;
          rows.push(`<row r="${r}">${cStr(1,r,'')}${cStr(2,r,a.name,'3')}${cFormula(3,r,formula,val,'3')}</row>`);
          rowRef[sid]=r; r++; break;
        }
        case 'total':{
          const refs=(a.sumOf||[]).map(ref=>rowRef[ref]).filter(Boolean);
          let formula=refs.length?refs.map(rr=>`C${rr}`).join('+'):'0';
          let val=m[sid]||0;
          rows.push(`<row r="${r}">${cStr(1,r,'')}${cStr(2,r,a.name,'3')}${cFormula(3,r,formula,val,'3')}</row>`);
          rowRef[sid]=r; r++; break;
        }
        case 'calc':{
          // 計算式をExcel数式に変換（単語境界で安全に置換）
          let f=a.formula;
          const sortedIds=[...Object.keys(rowRef)].sort((a,b)=>b.length-a.length);
          for(const k of sortedIds){
            const re=new RegExp(k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'(?![\\w])','g');
            f=f.replace(re,`C${rowRef[k]}`);
          }
          f=f.replace(/taxRate/g, String(parseFloat(d.taxRate||30)/100));
          f=f.replace(/ROUND\(([^,]+),(\d+)\)/g,'ROUND($1,$2)');
          const val=m[sid]||0;
          rows.push(`<row r="${r}">${cStr(1,r,'')}${cStr(2,r,a.name,'3')}${cFormula(3,r,f,val,'3')}</row>`);
          rowRef[sid]=r; r++; break;
        }
      }
    });
    return {xml:wsXml(rows.join(''),colDefs([12,36,16])), mapping, sheetLabel};
  };

  // EQ/CEQはエクスポート/インポート対象外（v12.7）

  // CF シート: マスタ駆動（v11.2）
  const sheetCF=(stKey,stmtType,label)=>{
    const isC=(stmtType==='CCF');
    const plC=isC?calcPL(S.cpl,true):calcPL(S.pl,false);

    const accts=S.accounts.filter(a=>a.stmt===stmtType);
    let r=1; const rows=[]; const mapping=[];
    rows.push(hRow(r++,'科目コード','勘定科目名','金額（円）'));
    accts.forEach(a=>{
      const sid=String(a.id);
      const val=m[sid]||0;
      switch(a.type){
        case 'header':
          rows.push(`<row r="${r}">${cStr(1,r,'')}${cStr(2,r,a.name,'3')}${cStr(3,r,'')}</row>`);r++;break;
        case 'item':
          rows.push(`<row r="${r}">${cStr(1,r,a.code||'')}${cStr(2,r,a.name)}${cNum(3,r,d[sid]||'')}</row>`);
          mapping.push({row:r,id:sid,deduct:false});r++;break;
        case 'subtotal': case 'total': case 'calc':
          rows.push(`<row r="${r}">${cStr(1,r,'')}${cStr(2,r,a.name,'3')}${cNum(3,r,val,'3')}</row>`);r++;break;
      }
    });
    return {xml:wsXml(rows.join(''),colDefs([12,36,16])), mapping, sheetLabel:label};
  };

  // 注記シート
  const sheetNotes=(d,label)=>{
    const stKey=label==='連結注記表'?'cnotes':'notes';
    migrateToNoteItems(stKey);
    const items=S[stKey].noteItems||[];
    let r=1; const rows=[];
    rows.push(hRow(r++,'セクション','項目タイトル','内容'));
    items.forEach(item=>{
      if(item.show===false) return;
      const secTitle=item.title||'';
      if(item.isDividend){
        (item.divItems||[]).forEach(di=>{
          if(di.isText){
            rows.push(dRow(r++,secTitle,di.title||'',di.content||''));
          } else if(di.rows){
            rows.push(dRow(r++,secTitle,di.title||'',di.note||''));
            (di.rows||[]).forEach(row=>{
              rows.push(dRow(r++,'',`${row.decision||''}|${row.stockType||''}|${row.source||''}`,`${row.amount||''}|${row.perShare||''}|${row.recordDate||''}|${row.effectDate||''}`));
            });
            if(di.footnote)rows.push(dRow(r++,'','（脚注）',di.footnote));
          }
        });
      } else {
        (item.subs||[]).forEach(sub=>{
          rows.push(dRow(r++,secTitle,sub.title||'',sub.content||''));
        });
      }
    });
    return {xml:wsXml(rows.join(''),colDefs([24,30,60])), sheetLabel:label};
  };

  // 事業報告書
  const sheetBR=()=>{
    let r=1; const rows=[hRow(r++,'セクションKey','セクション名','セクション表示','サブKey','サブタイトル','サブ表示','種別','内容/テーブルデータ')];
    S.br.items.forEach(sec=>{
      sec.subs.forEach(sub=>{
        let type='text', data=sub.content||'';
        if(sub.tableMode){
          type='table';
          const tbl={h:sub.tableHeaders||[], r:sub.tableRows||[]};
          if(sub.totalRow)tbl.totalRow=true;
          if(sub.extraFields)tbl.ef=sub.extraFields;
          if(sub.colWidths)tbl.cw=sub.colWidths;
          data=JSON.stringify(tbl);
        }
        rows.push(dRow(r++,sec.key||'',sec.secTitle,sec.show?'1':'0',sub.key||'',sub.subTitle||'',sub.show?'1':'0',type,data));
      });
    });
    if(S.br.enContent){
      rows.push(dRow(r++,'_EN','enContent','','','','','text',S.br.enContent));
    }
    return wsXml(rows.join(''),colDefs([12,20,6,12,24,6,6,80]));
  };
  const sheetPurposes=()=>{
    let r=1;
    return wsXml([hRow(r++,'目的ID','目的名','書類順序'),...Object.entries(S.purposes).map(([id,p])=>dRow(r++,id,p.label,p.docOrder.join(',')))].join(''),colDefs([16,20,60]));
  };

  // ═══ シート構成 ═══
  const cbsResult=sheetFSFromAccounts(S.cbs,'CBS','連結貸借対照表',true);
  const bsResult=sheetFSFromAccounts(S.bs,'BS','貸借対照表',false);
  const cplResult=sheetFSFromAccounts(S.cpl,'CPL','連結損益計算書',true);

  const allMappings=[cbsResult,bsResult,cplResult,plResult,cfResult,cfStdResult];

  // マッピングシート
  const sheetMapping=()=>{
    let r=1; const rows=[hRow(r++,'シート名','行番号','AccountID','控除')];
    allMappings.forEach(({sheetLabel,mapping})=>{
      (mapping||[]).forEach(m=>{ rows.push(dRow(r++,sheetLabel,m.row,String(m.id),m.deduct?'deduct':'')); });

    return wsXml(rows.join(''),colDefs([20,8,16,8]));
  };

  const sheets=[
    {name:'会社情報', xml:wsXml([
      (()=>{const d=S.co;let r=1;return [hRow(r++,'項目','値'),
        dRow(r++,'会社名',d.name),dRow(r++,'会社名（英語）',d.nameEN),dRow(r++,'事業年度',d.period),dRow(r++,'期首',d.from),dRow(r++,'期末',d.to),
        dRow(r++,'本社所在地',d.address),dRow(r++,'資本金（円）',d.capital),dRow(r++,'発行済株式数（当期）',d.shares),dRow(r++,'発行済株式数（前期）',d.prevShares),
        dRow(r++,'表示単位',d.unit),dRow(r++,'代表者',d.directors),dRow(r++,'監査役',d.auditors),dRow(r++,'作成日',d.preparedDate),dRow(r++,'USD換算レート',d.usdRate),dRow(r++,'従業員数（当期）',d.employees),dRow(r++,'従業員数（前期）',d.prevEmployees),dRow(r++,'連結従業員数（当期）',d.consEmployees||''),dRow(r++,'連結従業員数（前期）',d.prevConsEmployees||''),
        dRow(r++,'unitVersion',String(S.unitVersion||11)),
      ].join('');})()
    ].join(''),colDefs([20,40]))},
    {name:'連結貸借対照表', xml:cbsResult.xml},
    {name:'連結損益計算書', xml:cplResult.xml},
    // EQ/CEQデータエクスポート（マトリクスデータ: 行ID|列ID|値）
    {name:'連結CF計算書', xml:cfResult.xml},
    ...(S.ceq&&S.ceq.data&&Object.keys(S.ceq.data).length?[{name:'連結EQデータ',xml:(()=>{
      let r=1;const rows=[hRow(r++,'行ID','列ID','値')];
      Object.entries(S.ceq.data).forEach(([rk,row])=>{Object.entries(row||{}).forEach(([ck,v])=>{if(v)rows.push(dRow(r++,rk,ck,v));});});
      return wsXml(rows.join(''),colDefs([24,24,16]));
    })()}]:[]),
    {name:'連結注記表', xml:sheetNotes(S.cnotes,'連結注記表').xml},
    {name:'貸借対照表', xml:bsResult.xml},
    {name:'損益計算書', xml:plResult.xml},
    ...(S.eq&&S.eq.data&&Object.keys(S.eq.data).length?[{name:'EQデータ',xml:(()=>{
      let r=1;const rows=[hRow(r++,'行ID','列ID','値')];
      Object.entries(S.eq.data).forEach(([rk,row])=>{Object.entries(row||{}).forEach(([ck,v])=>{if(v)rows.push(dRow(r++,rk,ck,v));});});
      return wsXml(rows.join(''),colDefs([24,24,16]));
    })()}]:[]),
    {name:'CF計算書', xml:cfStdResult.xml},
    {name:'注記表', xml:sheetNotes(S.notes,'注記表').xml},
    {name:'事業報告書', xml:sheetBR()},
    {name:'書類構成', xml:sheetPurposes()},
    {name:'__mapping', xml:sheetMapping()},
    // ── 前期データ + 業績ハイライト ──
    ...(Object.keys(S.prev_cbs||{}).length?[{name:'前期連結BS', xml:sheetFSFromAccounts(S.prev_cbs,'CBS','前期連結BS',true).xml}]:[]),
    ...(Object.keys(S.prev_cpl||{}).length?[{name:'前期連結PL', xml:sheetFSFromAccounts(S.prev_cpl,'CPL','前期連結PL',true).xml}]:[]),
    ...(Object.keys(S.prev_bs||{}).length?[{name:'前期BS', xml:sheetFSFromAccounts(S.prev_bs,'BS','前期BS',false).xml}]:[]),
    ...(Object.keys(S.prev_pl||{}).length?[{name:'前期PL', xml:sheetFSFromAccounts(S.prev_pl,'PL','前期PL',false).xml}]:[]),

      return wsXml(rows.join(''),colDefs([24,16]));

    ...(Object.keys(S.prev_cf||{}).length?[{name:'前期CF', xml:(()=>{
      const d=S.prev_cf;let r=1;const rows=[hRow(r++,'科目','金額')];
      Object.keys(d).forEach(k=>{if(d[k])rows.push(dRow(r++,k,d[k]));});
      return wsXml(rows.join(''),colDefs([24,16]));
    })()}]:[]),
    ...(Object.keys(S.summary||{}).length||Object.keys(S.prev2||{}).some(k=>S.prev2[k])?[{name:'業績ハイライト', xml:(()=>{
      const d={...(S.summary||{})};
      // prev2も同じシートに保存
      const p2=S.prev2||{};
      if(p2.cbsNA)d['prev2_cbsNA']=p2.cbsNA;
      if(p2.cbsTA)d['prev2_cbsTA']=p2.cbsTA;
      if(p2.bsNA)d['prev2_bsNA']=p2.bsNA;
      if(p2.bsTA)d['prev2_bsTA']=p2.bsTA;
      let r=1;const rows=[hRow(r++,'項目','値')];
      Object.keys(d).forEach(k=>{if(d[k])rows.push(dRow(r++,k,d[k]));});
      return wsXml(rows.join(''),colDefs([24,16]));
    })()}]:[]),
  ];

  // xlsx XML
  const sheetRelsXml=sheets.map((_,i)=>`<Relationship Id="rId${i+1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet${i+1}.xml"/>`).join('');
  const sheetsXml=sheets.map((s,i)=>`<sheet name="${xe(s.name)}" sheetId="${i+1}" r:id="rId${i+1}"/>`).join('');
  const contentTypesXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
<Default Extension="xml" ContentType="application/xml"/>
<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>
${sheets.map((_,i)=>`<Override PartName="/xl/worksheets/sheet${i+1}.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`).join('')}
<Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>
</Types>`;
  const relsXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>`;
  const wbRelsXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">${sheetRelsXml}</Relationships>`;
  const wbXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>${sheetsXml}</sheets></workbook>`;
  const stylesXml=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">
<fonts count="3"><font><sz val="10"/><name val="Meiryo"/></font><font><sz val="10"/><b/><color rgb="FFFFFFFF"/><name val="Meiryo"/></font><font><sz val="10"/><b/><color rgb="FF1A2744"/><name val="Meiryo"/></font></fonts>
<fills count="4"><fill><patternFill patternType="none"/></fill><fill><patternFill patternType="gray125"/></fill><fill><patternFill patternType="solid"><fgColor rgb="FF1A2744"/></patternFill></fill><fill><patternFill patternType="solid"><fgColor rgb="FFE8F0FE"/></patternFill></fill></fills>
<borders count="1"><border><left/><right/><top/><bottom/><diagonal/></border></borders>
<cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>
<cellXfs count="4"><xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/><xf numFmtId="0" fontId="1" fillId="2" borderId="0" xfId="0" applyFont="1" applyFill="1"/><xf numFmtId="3" fontId="0" fillId="0" borderId="0" xfId="0" applyNumberFormat="1"/><xf numFmtId="3" fontId="2" fillId="3" borderId="0" xfId="0" applyNumberFormat="1" applyFont="1" applyFill="1"/></cellXfs>
</styleSheet>`;
  const files=[
    {name:'[Content_Types].xml', data:utf8(contentTypesXml)},
    {name:'_rels/.rels', data:utf8(relsXml)},
    {name:'xl/workbook.xml', data:utf8(wbXml)},
    {name:'xl/_rels/workbook.xml.rels', data:utf8(wbRelsXml)},
    {name:'xl/styles.xml', data:utf8(stylesXml)},
    ...sheets.map((s,i)=>({name:`xl/worksheets/sheet${i+1}.xml`, data:utf8(s.xml)})),
  ];
  const zipData=buildZip(files);
  const blob=new Blob([zipData],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`${S.co.name}_${S.co.period}_disclosure.xlsx`;a.click();URL.revokeObjectURL(a.href);
  showToast('✅ Excelエクスポート完了！（3列形式・計算式付き）');
}

// ── XLSX IMPORT ────────────────────────────────────────────────
async function importExcel(input){
  const file=input.files[0]; if(!file)return;
  input.value='';
  try{
    const buf=await file.arrayBuffer();
    const zipFiles=await unzipOfficeXml(buf);
    const readXml=name=>{const data=zipFiles[name]||zipFiles[name.replace(/^\//,'')];return data?new TextDecoder().decode(data):null;};
    const sharedXml=readXml('xl/sharedStrings.xml')||'';
    const shared=[];{
      const re=/<si[^>]*>([\s\S]*?)<\/si>/g; let m;
      while((m=re.exec(sharedXml))!==null){
        const si=m[1].replace(/<rPh[\s\S]*?<\/rPh>/g,'').replace(/<phoneticPr[^/]*\/>/g,'');
        const parts=[...si.matchAll(/<t[^>]*>([\s\S]*?)<\/t>/g)].map(x=>x[1]);
        const raw=(parts.length?parts.join(''):si).replace(/<[^>]+>/g,'');
        shared.push(raw.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'"));
      }
    }
    const getCells=xmlStr=>{
      if(!xmlStr)return {};
      const cells={};
      const re=/<c r="([A-Z]+\d+)"([^>]*)>([\s\S]*?)<\/c>/g; let m;
      while((m=re.exec(xmlStr))!==null){
        const ref=m[1], attrs=m[2]||'', inner=m[3]||'';
        let val='';
        if(/t="inlineStr"/.test(attrs)){
          const parts=[...inner.matchAll(/<t[^>]*>([\s\S]*?)<\/t>/g)].map(x=>x[1]);
          val=(parts.length?parts.join(''):'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'");
        }else{
          const vm=inner.match(/<v>([\s\S]*?)<\/v>/);
          if(vm) val=vm[1];
          if(/t="s"/.test(attrs)){
            const idx=parseInt(val,10);
            val=Number.isFinite(idx)?(shared[idx]??''):'';
          }
        }
        cells[ref]=val;
      }
      return cells;
    };
    const wbXml=readXml('xl/workbook.xml')||'';
    const sheetNames=[];const snRe=/<sheet name="([^"]*)"[^/]*\/>/g;let snM;
    while((snM=snRe.exec(wbXml))!==null)sheetNames.push(snM[1].replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>'));
    const sheetIdx=name=>sheetNames.indexOf(name)+1;
    const getSheet=name=>{const idx=sheetIdx(name);if(!idx)return {};return getCells(readXml(`xl/worksheets/sheet${idx}.xml`));};

    // ── 会社情報 ──
    const coSheet=getSheet('会社情報');
    const coMap={'会社名':'name','会社名（英語）':'nameEN','事業年度':'period','期首':'from','期末':'to','本社所在地':'address','資本金（千円）':'capital','資本金（円）':'capital','発行済株式数':'shares','発行済株式数（当期）':'shares','発行済株式数（前期）':'prevShares','表示単位':'unit','代表者':'directors','監査役':'auditors','作成日':'preparedDate','USD換算レート':'usdRate','従業員数（当期）':'employees','従業員数（前期）':'prevEmployees','連結従業員数（当期）':'consEmployees','連結従業員数（前期）':'prevConsEmployees'};
    let coRow=2;
    while(coSheet[`A${coRow}`]!==undefined){
      const label=coSheet[`A${coRow}`];
      if(label==='unitVersion'){S.unitVersion=parseInt(coSheet[`B${coRow}`])||0;}
      else if(coMap[label])S.co[coMap[label]]=coSheet[`B${coRow}`]||'';
      coRow++;
    }

    // ── __mapping シートを使って財務データを復元（3列形式: C列が値） ──
    const mapSheet=getSheet('__mapping');
    let mr=2;
    while(mapSheet[`A${mr}`]!==undefined){
      const sheetLabel=mapSheet[`A${mr}`];
      const dataRow=parseInt(mapSheet[`B${mr}`])||0;
      const accountId=mapSheet[`C${mr}`];
      const deduct=String(mapSheet[`D${mr}`]||'')==='deduct';
      const targetSheet=getSheet(sheetLabel);
      // 3列形式: データはC列
      const rawVal=targetSheet[`C${dataRow}`];
      if(rawVal!==undefined&&rawVal!==''){
        const storeVal=String(rawVal);
        if(sheetLabel==='連結貸借対照表'||sheetLabel==='貸借対照表'){
          const stKey=sheetLabel==='連結貸借対照表'?'cbs':'bs';
          S[stKey][accountId]=storeVal;
        } else if(sheetLabel==='連結損益計算書'||sheetLabel==='損益計算書'){
          const stKey=sheetLabel==='連結損益計算書'?'cpl':'pl';
          S[stKey][accountId]=storeVal;
        } else if(sheetLabel==='連結CF計算書'||sheetLabel==='CF計算書'){
          const stKey=sheetLabel==='連結CF計算書'?'ccf':'cf';
          S[stKey][accountId]=storeVal;
        }
        // EQ/CEQはインポート対象外（v12.7）
      }
      mr++;
    }

    // ── EQ/CEQはインポート対象外（v12.7） ──

    // ── EQ/CEQデータ ──
    ['連結EQデータ','EQデータ'].forEach(sn=>{
      const eqSheet=getSheet(sn);
      if(!eqSheet['A2'])return;
      const stKey=sn==='連結EQデータ'?'ceq':'eq';
      if(!S[stKey])S[stKey]={};
      if(!S[stKey].data)S[stKey].data={};
      let r=2;
      while(eqSheet[`A${r}`]!==undefined){
        const rowId=eqSheet[`A${r}`]||'';
        const colId=eqSheet[`B${r}`]||'';
        const val=eqSheet[`C${r}`]||'';
        if(rowId&&colId){
          if(!S[stKey].data[rowId])S[stKey].data[rowId]={};
          S[stKey].data[rowId][colId]=val;
        }
        r++;
      }
    });

    // ── 注記表 ──
    ['連結注記表','注記表'].forEach(sn=>{
      const ns=getSheet(sn);const stKey=sn==='連結注記表'?'cnotes':'notes';
      if(!ns['A2']&&!ns['B2'])return; // シートが空
      // Excel行を読み取り
      const allRows=[];let r=2;
      while(ns[`A${r}`]!==undefined||ns[`B${r}`]!==undefined){
        allRows.push({sec:ns[`A${r}`]||'',title:ns[`B${r}`]||'',content:ns[`C${r}`]||''});
        r++;
      }
      // セクションごとにグループ化（同じA列タイトルはマージ、A列空は前アイテムの子データ）
      const secMap=new Map(); // タイトル→section
      const sections=[];let curSec=null;
      allRows.forEach(row=>{
        if(row.sec){
          // 同じタイトルのセクションが既にあればそこに追加
          if(secMap.has(row.sec)){
            curSec=secMap.get(row.sec);
            curSec.items.push({title:row.title,content:row.content,_children:[]});
          } else {
            curSec={secTitle:row.sec,items:[{title:row.title,content:row.content,_children:[]}]};
            secMap.set(row.sec,curSec);
            sections.push(curSec);
          }
        } else if(curSec&&curSec.items.length>0&&(row.title||row.content)){
          curSec.items[curSec.items.length-1]._children.push({title:row.title,content:row.content});
        }
      });
      // noteItemsを直接構築（旧sec1-sec8マッピング不要）
      const DIV_KEYS=['decision','stockType','source','amount','perShare','recordDate','effectDate'];
      const noteItems=sections.map(sec=>{
        // 配当セクション判定: 子データにパイプ区切りがあるか
        const hasDivData=sec.items.some(it=>it._children.some(c=>c.title.includes('|')||c.content.includes('|')));
        if(hasDivData){
          const divItems=sec.items.map(it=>{
            const dataRows=it._children.filter(c=>c.title!=='（脚注）');
            const footnoteRow=it._children.find(c=>c.title==='（脚注）');
            if(dataRows.length>0&&dataRows.some(c=>c.title.includes('|')||c.content.includes('|'))){
              const rows=dataRows.map(dr=>{
                const tP=(dr.title||'').split('|');const cP=(dr.content||'').split('|');const row={};
                DIV_KEYS.forEach((k,ki)=>{row[k]=ki<3?(tP[ki]||'').trim():(cP[ki-3]||'').trim();});
                return row;
              });
              const entry={title:it.title,rows};
              if(it.content)entry.note=it.content;
              if(footnoteRow)entry.footnote=footnoteRow.content||'';
              return entry;
            }
            return {title:it.title,isText:true,content:it.content||''};
          });
          return {title:sec.secTitle,show:true,isDividend:true,divItems};
        }
        // 通常セクション
        return {title:sec.secTitle,show:true,subs:sec.items.map(it=>({title:it.title,content:it.content}))};
      });
      S[stKey].noteItems=noteItems;
    });

    // ── 事業報告書 ──
    const brSheet=getSheet('事業報告書');
    if(brSheet['A2']){
      // 新旧形式の判定：A1ヘッダーが'セクションKey'なら新形式、'#'なら旧7列形式
      const isNewBR=String(brSheet['A1']||'').includes('Key')||String(brSheet['G1']||'').includes('種別');
      let br=2;
      while(brSheet[`A${br}`]!==undefined||brSheet[`B${br}`]!==undefined){
        const secKey=String(brSheet[`A${br}`]||'').trim();
        if(secKey==='_EN'||secKey==='EN'){
          S.br.enContent=brSheet[isNewBR?`H${br}`:`G${br}`]||'';
          br++;continue;
        }
        if(!secKey){br++;continue;}
        const secTitle=brSheet[`B${br}`]||'';
        const secShowRaw=String(brSheet[`C${br}`]||'1');
        const secShow=secShowRaw!=='0'&&secShowRaw!=='非表示';
        const subKey=String(brSheet[`D${br}`]||'').trim();
        const subTitle=brSheet[`E${br}`]||'';
        const subShowRaw=String(brSheet[`F${br}`]||'1');
        const subShow=subShowRaw!=='0'&&subShowRaw!=='非表示';
        let typeV, dataV;
        if(isNewBR){
          typeV=brSheet[`G${br}`]||'text';
          dataV=brSheet[`H${br}`]||'';
        } else {
          // 旧形式: G列が内容テキスト（種別なし）
          typeV='text';
          dataV=brSheet[`G${br}`]||'';
        }
        let sec=S.br.items.find(s=>s.key===secKey);
        if(!sec){
          const idx=parseInt(secKey)-1;
          if(!isNaN(idx)&&S.br.items[idx])sec=S.br.items[idx];
        }
        if(sec){
          sec.secTitle=secTitle; sec.show=secShow;
          let sub=sec.subs.find(s=>s.key===subKey);
          if(!sub){
            const si=parseInt(subKey)-1;
            if(!isNaN(si)&&sec.subs[si])sub=sec.subs[si];
          }
          if(sub){
            sub.subTitle=subTitle; sub.show=subShow;
            if(typeV==='table'){
              sub.tableMode=true;
              try{
                const tbl=JSON.parse(dataV);
                sub.tableHeaders=tbl.h||tbl.headers||[];
                sub.tableRows=(tbl.r||tbl.rows||[]).map(r=>typeof r==='object'&&r.cells?r:{cells:Array.isArray(r)?r:[]});
                if(tbl.totalRow)sub.totalRow=true;
                if(tbl.ef||tbl.extraFields)sub.extraFields=tbl.ef||tbl.extraFields;
                if(tbl.cw||tbl.colWidths)sub.colWidths=tbl.cw||tbl.colWidths;
              }catch(e){sub.content=dataV;}
            } else {
              sub.content=dataV;
            }
          }
        }
        br++;
      }
    }

    // ── 書類構成 ──
    const purSheet=getSheet('書類構成');
    let pr=2;
    while(purSheet[`A${pr}`]!==undefined){
      const ptId=purSheet[`A${pr}`];const orderStr=purSheet[`C${pr}`];
      if(ptId in S.purposes&&orderStr)S.purposes[ptId].docOrder=orderStr.split(',').filter(Boolean);
      pr++;
    }

    // ── 前期データの復元 ──
    const prevFSPairs=[
      ['前期連結BS','prev_cbs','BS',true],['前期連結PL','prev_cpl','CPL',true],
      ['前期BS','prev_bs','BS',false],['前期PL','prev_pl','PL',false]
    ];
    prevFSPairs.forEach(([sheetName,stKey,stmtFilter,isC])=>{
      const ps=getSheet(sheetName);
      if(!ps['A2'])return;
      S[stKey]={};
      const accts=S.accounts.filter(a=>a.stmt===stmtFilter);
      let pr=2;
      while(ps[`B${pr}`]!==undefined){
        const name=ps[`B${pr}`];const val=ps[`C${pr}`];
        if(name&&val!==undefined&&val!==''){
          const matched=accts.find(a=>a.name===name);
          if(matched)S[stKey][matched.id]=String(val);
        }
        pr++;
      }
    });
    // 前期CF（キー:値形式）
    ['前期連結CF','前期CF'].forEach(sn=>{
      const ps=getSheet(sn);if(!ps['A2'])return;
      const stKey=sn==='前期連結CF'?'prev_ccf':'prev_cf';
      S[stKey]={};let pr=2;
      while(ps[`A${pr}`]!==undefined){
        const k=ps[`A${pr}`];const v=ps[`B${pr}`];
        if(k&&v!==undefined)S[stKey][k]=String(v);
        pr++;
      }
    });
    // 業績ハイライト
    {const ss=getSheet('業績ハイライト');
    if(ss['A2']){
      S.summary={};S.prev2=S.prev2||{};let sr=2;
      while(ss[`A${sr}`]!==undefined){
        const k=ss[`A${sr}`];const v=ss[`B${sr}`];
        if(k&&v!==undefined){
          if(k.startsWith('prev2_')){S.prev2[k.replace('prev2_','')]=String(v);}
          else{S.summary[k]=String(v);}
        }
        sr++;
      }
    }}

    showToast('✅ Excelインポート完了！');
    render();
  }catch(e){
    showToast('❌ Excelの読み込みに失敗: '+e.message);
    console.error(e);
  }
}

//  CSV EXPORT（構造化CSV、セクション区切り）
// ══════════════════════════════════════════════
function exportCSVData(){
  const BOM='\uFEFF';
  const csvQ=v=>'"'+String(v??'').replace(/"/g,'""').replace(/\n/g,'\\n')+'"';
  const row=(...cols)=>cols.map(csvQ).join(',')+'\n';
  const sec=name=>`[SECTION:${name}]\n`;

  let out=BOM;
  // ── 会社情報 ────────────────────────────────────────────────
  out+=sec('会社情報');
  out+=row('キー','値');
  Object.entries(S.co).forEach(([k,v])=>out+=row(k,v));
  out+='\n';
  // ── 財務データ（数値フラット） ─────────────────────────────
  const fsSection=(name,obj)=>{
    let s=sec(name);
    s+=row('キー','値');
    Object.entries(obj).forEach(([k,v])=>s+=row(k,v));
    return s+'\n';
  };
  out+=fsSection('連結BS',S.cbs);
  out+=fsSection('連結PL',S.cpl);
  out+=fsSection('連結EQ',S.ceq);
  out+=fsSection('連結CF',S.ccf);
  out+=fsSection('単体BS',S.bs);
  out+=fsSection('単体PL',S.pl);
  out+=fsSection('単体EQ',S.eq);
  // ── 注記表 ──────────────────────────────────────────────────
  const notesSection=(name,obj)=>{
    let s=sec(name);
    s+=row('キー','テキスト');
    Object.entries(obj).forEach(([k,v])=>s+=row(k,v));
    return s+'\n';
  };
  out+=notesSection('連結注記表',S.cnotes);
  out+=notesSection('注記表',S.notes);
  // ── 事業報告書 ──────────────────────────────────────────────
  out+=sec('事業報告書');
  out+=row('セクション番号','セクションタイトル','セクション表示','サブ番号','サブタイトル','サブ表示','種別','内容/テーブルデータ');
  S.br.items.forEach((sec_,si)=>{
    sec_.subs.forEach((sub,subi)=>{
      let type='text', data=sub.content||'';
      if(sub.tableMode){
        type='table';
        const tbl={h:sub.tableHeaders||[], r:sub.tableRows||[]};
        if(sub.totalRow)tbl.totalRow=true;
        if(sub.extraFields)tbl.ef=sub.extraFields;
        data=JSON.stringify(tbl);
      }
      out+=row(si+1,sec_.secTitle,sec_.show?'1':'0',subi+1,sub.subTitle,sub.show?'1':'0',type,data);
    });
  });
  if(S.br.enContent)out+=row('EN','enContent','','','','','text',S.br.enContent);
  out+='\n';
  // ── 勘定科目マスタ ───────────────────────────────────────────
  out+=sec('勘定科目マスタ');
  out+=row('コード','科目名','区分');
  S.accounts.forEach(a=>out+=row(a.code,a.name,a.cat));
  out+='\n';
  // ── 書類構成 ────────────────────────────────────────────────
  out+=sec('書類構成');
  out+=row('目的ID','目的名','書類順序（カンマ区切り）');
  Object.entries(S.purposes).forEach(([id,p])=>{
    out+=row(id,p.label,p.docOrder.join(','));
  });
  out+='\n';

  const blob=new Blob([out],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);

function importCSVData(input){
  const file=input.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const text=e.target.result.replace(/^\uFEFF/,'');
      const lines=text.split(/\r?\n/);

      // CSV行パーサー
      const parseRow=line=>{
        const res=[];let inQ=false,f='';
        for(let i=0;i<line.length;i++){
          const ch=line[i];
          if(ch==='"'){if(inQ&&line[i+1]==='"'){f+='"';i++;}else inQ=!inQ;}
          else if(ch===','&&!inQ){res.push(f.replace(/\\n/g,'\n'));f='';}
          else f+=ch;
        }
        res.push(f.replace(/\\n/g,'\n'));return res;
      };

      let curSec='';
      let brRows=[];
      let brParsed=false;

      for(let i=0;i<lines.length;i++){
        const line=lines[i].trim();
        if(!line)continue;
        // セクション検出
        const secMatch=line.match(/^\[SECTION:(.+)\]$/);
        if(secMatch){curSec=secMatch[1];continue;}
        const cols=parseRow(lines[i]);
        if(cols.length<2)continue;
        const [k,v]=cols;
        // ヘッダー行スキップ
        if(k==='キー'||k==='コード'||k==='目的ID'||k==='セクション番号')continue;

        if(curSec==='会社情報'){
          if(k==='unitVersion'){S.unitVersion=parseInt(v)||11;}
          else if(k in S.co)S.co[k]=v;
        } else if(curSec==='連結BS'&&k in S.cbs){S.cbs[k]=v;}
        else if(curSec==='連結PL'&&k in S.cpl){S.cpl[k]=v;}
        else if(curSec==='連結EQ'&&k in S.ceq){S.ceq[k]=v;}
        else if(curSec==='連結CF'&&k in S.ccf){S.ccf[k]=v;}
        else if(curSec==='単体BS'&&k in S.bs){S.bs[k]=v;}
        else if(curSec==='単体PL'&&k in S.pl){S.pl[k]=v;}
        else if(curSec==='単体EQ'&&k in S.eq){S.eq[k]=v;}
        else if(curSec==='連結注記表'&&k in S.cnotes){S.cnotes[k]=v;}
        else if(curSec==='注記表'&&k in S.notes){S.notes[k]=v;}
        else if(curSec==='事業報告書'){
          brRows.push(cols);
        } else if(curSec==='勘定科目マスタ'&&cols.length>=3){
          if(!brParsed&&brRows.length>0){
            // 事業報告書のパース（新形式: 8列 #/セクション/表示/サブ#/サブタイトル/表示/種別/内容）
            const newItems=[];
            brRows.forEach(row=>{
              if(row.length<7)return;
              const colA=String(row[0]||'');
              if(colA==='EN'){S.br.enContent=row[7]||row[6]||'';return;}
              const siN=parseInt(colA)-1;
              if(isNaN(siN))return;
              const secTitleV=row[1],secShowV=String(row[2]||'1')==='1';
              const subiN=parseInt(row[3])-1;
              const subTitleV=row[4],subShowV=String(row[5]||'1')==='1';
              // 旧形式（7列: row[6]=content）と新形式（8列: row[6]=type, row[7]=data）の判定
              const isNewFmt=row[6]==='text'||row[6]==='table';
              const typeV=isNewFmt?row[6]:'text';
              const dataV=isNewFmt?(row[7]||''):(row[6]||'');
              if(!newItems[siN]){
                newItems[siN]={key:'sec'+(siN+1),secTitle:secTitleV,isSec:true,show:secShowV,subs:[]};
              }
              const sub={key:'sub_'+siN+'_'+subiN,subTitle:subTitleV,show:subShowV};
              if(typeV==='table'){
                sub.tableMode=true;
                try{const tbl=JSON.parse(dataV);sub.tableHeaders=tbl.h||[];sub.tableRows=tbl.r||[];if(tbl.totalRow)sub.totalRow=true;if(tbl.ef)sub.extraFields=tbl.ef;}
                catch(e){sub.tableHeaders=[];sub.tableRows=[];}
              } else {
                sub.content=dataV;
              }
              newItems[siN].subs[subiN]=sub;
            });
            if(newItems.filter(Boolean).length>0)S.br.items=newItems.filter(Boolean);
            brParsed=true;
          }
          if(cols.length>=3&&cols[0]!=='コード'){
            // 初回は上書き
          }
        } else if(curSec==='書類構成'&&cols.length>=3){
          const ptId=k;
          if(ptId in S.purposes){
            S.purposes[ptId].docOrder=cols[2].split(',').filter(Boolean);
          }
        }
      }
      // 勘定科目マスタを最後に再パース
      const accStart=lines.findIndex(l=>l.trim()==='[SECTION:勘定科目マスタ]');
      if(accStart>=0){
        const newAcc=[];
        for(let i=accStart+2;i<lines.length;i++){
          const l=lines[i].trim();
          if(!l||l.startsWith('[SECTION:'))break;
          const p=parseRow(lines[i]);
          if(p.length>=3&&p[0]!=='コード')newAcc.push({id:NID++,code:p[0],name:p[1],cat:p[2]});
        }
        if(newAcc.length>0)S.accounts=newAcc;
      }
      showToast('✅ CSVインポート完了！');
      render();
    }catch(err){showToast('❌ CSVの読み込みに失敗しました: '+err.message);}
  };
  r.readAsText(file,'utf-8');input.value='';
}

async function extractDocxText(ab){
  const bytes=new Uint8Array(ab);
  for(let i=0;i<bytes.length-30;i++){
    if(bytes[i]!==0x50||bytes[i+1]!==0x4B||bytes[i+2]!==0x03||bytes[i+3]!==0x04)continue;
    const fnLen=bytes[i+26]|(bytes[i+27]<<8);const extraLen=bytes[i+28]|(bytes[i+29]<<8);
    const dataOff=i+30+fnLen+extraLen;
    const fn=new TextDecoder().decode(bytes.slice(i+30,i+30+fnLen));
    if(fn!=='word/document.xml')continue;
    const compSize=bytes[i+18]|(bytes[i+19]<<8)|(bytes[i+20]<<16)|(bytes[i+21]<<24);
    const method=bytes[i+8]|(bytes[i+9]<<8);
    let xml='';
    if(method===0){xml=new TextDecoder('utf-8').decode(bytes.slice(dataOff,dataOff+compSize));}
    else if(method===8&&typeof DecompressionStream!=='undefined'){
      try{const ds=new DecompressionStream('deflate-raw');const w=ds.writable.getWriter();const rd=ds.readable.getReader();
        w.write(bytes.slice(dataOff,dataOff+compSize));w.close();
        const chunks=[];let tot=0;
        while(true){const{done,value}=await rd.read();if(done)break;chunks.push(value);tot+=value.length;}
        const out=new Uint8Array(tot);let off=0;for(const ch of chunks){out.set(ch,off);off+=ch.length;}
        xml=new TextDecoder('utf-8').decode(out);
      }catch(e){return null;}}
    if(!xml)return null;
    return xml.replace(/<w:p[ >]/g,'\n<w:p>').match(/<w:t[^>]*>([^<]*)<\/w:t>/g)?.map(m=>m.replace(/<[^>]+>/g,'')).join('')||'';
  }return null;
}

async function importReportFile(input,rKey){
  const file=input.files[0];if(!file)return;
  const r=S[rKey];
  if(file.name.toLowerCase().endsWith('.docx')){
    const buf=await file.arrayBuffer();const text=await extractDocxText(buf);
    r.type='word';r.textContent=text||'（テキスト抽出に失敗しました）';r.dataUrl='';
  }else if(file.type.startsWith('image/')){
    r.dataUrl=await new Promise(res=>{const rd=new FileReader();rd.onload=e=>res(e.target.result);rd.readAsDataURL(file);});
    r.type='image';r.textContent='';
  }else if(file.type==='application/pdf'){
    r.dataUrl=await new Promise(res=>{const rd=new FileReader();rd.onload=e=>res(e.target.result);rd.readAsDataURL(file);});
    r.type='pdf';r.textContent='';
  }else{
    r.textContent=await new Promise(res=>{const rd=new FileReader();rd.onload=e=>res(e.target.result);rd.readAsText(file);});
    r.type='text';r.dataUrl='';
  }
  showToast(`✅ ${file.name} をインポートしました`);input.value='';renderContent();
}

async function importFromHtml(input){
  const file=input.files[0];if(!file)return;
  input.value='';
  try{
    const text=await file.text();
    // HTMLからsaved-data JSONを抽出
    const m=text.match(/<script\s+id=["']saved-data["'][^>]*>([\s\S]*?)<\/script>/);
    if(!m||!m[1].trim()){showToast('❌ HTMLファイルにデータが見つかりません');return;}
    const saved=JSON.parse(m[1]);
    // 確認ダイアログ
    const name=saved.co&&saved.co.name||'不明';
    const period=saved.co&&saved.co.period||'不明';
    if(!confirm(`「${name} ${period}」のデータを読み込みます。\n現在のデータは上書きされます。よろしいですか？`))return;
    // 全データを上書き
    Object.keys(saved).forEach(k=>{S[k]=saved[k];});
    // マイグレーション実行
    migrateOldFsFormat();
    showToast(`✅ ${name} ${period} のデータを読み込みました（EQデータ含む全データ復元）`);
    render();
  }catch(e){
    showToast('❌ HTMLの読み込みに失敗: '+e.message);
    console.error(e);
  }
}

function renderSidebar(){

// v12.8: ページ別レイアウト調整
function _applyPageStyle(el,pgId){
  if(!S.pageStyle)S.pageStyle={};
  if(!S.style)S.style={};
  const docType=_pgIdToDocType(pgId);
  const s=S.style;
  const ps=S.pageStyle[pgId];
  // デフォルト値マップ（docType別）
  const DEF_FS={CEQ:'11',EQ:'11',EnCEQ:'11',EnEQ2:'11'};
  const DEF_PV={BR1:'48',BR2:'48',CNote:'48',Note:'48',Cover:'48',Review:'48',Audit:'48',EnBR:'48'};
  const DEF_PH={BR1:'58',BR2:'58',CNote:'58',Note:'58',Cover:'58',Review:'58',Audit:'58',EnBR:'58'};
  // Apply document-type defaults (unless page-level override exists)
  if(docType&&!ps){
    const lhKey='lh'+docType, fsKey='fs'+docType;
    const pvKey='pv'+docType, phKey='ph'+docType, prKey='pr'+docType;
    const zmKey='zm'+docType;
    // BR1/BR2は旧BRキーからフォールバック、Comp*は旧CompC/CompSからフォールバック
    const compFB=docType.startsWith('CompC')?'CompC':docType.startsWith('CompB')||docType.startsWith('CompP')||docType==='CompCF'?'CompS':null;
    const brFB=(docType==='BR1'||docType==='BR2')?'BR':null;
    const fb=brFB||compFB;
    const lh=s[lhKey]||(fb?s['lh'+fb]:null)||'1.8';
    const fs=s[fsKey]||(fb?s['fs'+fb]:null)||DEF_FS[docType]||'14';
    const pv=s[pvKey]||(fb?s['pv'+fb]:null)||DEF_PV[docType]||'34';
    const ph=s[phKey]||(fb?s['ph'+fb]:null)||DEF_PH[docType]||'58';
    const pr=s[prKey]||(fb?s['pr'+fb]:null)||DEF_PH[docType]||'58';
    el.style.lineHeight=lh;
    el.style.fontSize=fs+'px';
    el.style.paddingTop=pv+'px';el.style.paddingBottom=pv+'px';
    const offset=parseInt(s.printOffset||'0')||0;
    el.style.paddingLeft=(parseInt(ph)+offset)+'px';
    el.style.paddingRight=(parseInt(pr)-offset)+'px';
    if(s[zmKey]&&s[zmKey]!=='1'&&s[zmKey]!=='1.0') el.style.zoom=s[zmKey];
  }
  if(!ps)return;
  const _offset=parseInt(s.printOffset||'0')||0;
  if(ps.fontSize) el.style.fontSize=ps.fontSize+'px';
  if(ps.lineHeight) el.style.lineHeight=ps.lineHeight;
  if(ps.padV){el.style.paddingTop=ps.padV+'px';el.style.paddingBottom=ps.padV+'px';}
  if(ps.padH){el.style.paddingLeft=(parseInt(ps.padH)+_offset)+'px';}
  if(ps.padR){el.style.paddingRight=(parseInt(ps.padR)-_offset)+'px';}
  if(ps.zoom&&ps.zoom!=='1') el.style.zoom=ps.zoom;
}
function _pgIdToDocType(pgId){
  if(!pgId)return '';
  // 表紙
  if(/^cover/.test(pgId))return 'Cover';
  if(/^shoshu/.test(pgId))return 'BR1';
  if(/^seg_overview|^mtplan/.test(pgId))return 'BR1';
  // 比較FS（個別）
  if(pgId.startsWith('compare_cbs'))return 'CompCBS';
  if(pgId.startsWith('compare_cpl'))return 'CompCPL';
  if(pgId.startsWith('compare_ccf'))return 'CompCCF';
  if(pgId.startsWith('compare_cf'))return 'CompCF';
  if(pgId.startsWith('compare_bs'))return 'CompBS';
  if(pgId.startsWith('compare_pl'))return 'CompPL';
  // EN FS（書類単位）
  if(/^en_cbs/.test(pgId))return 'EnCBS';
  if(/^en_cpl/.test(pgId))return 'EnCPL';
  if(/^en_ccf/.test(pgId))return 'EnCCF';
  if(/^en_ceq/.test(pgId))return 'EnCEQ';
  if(/^en_bs/.test(pgId))return 'EnBS2';
  if(/^en_pl/.test(pgId))return 'EnPL2';
  if(/^en_cf/.test(pgId))return 'EnCF2';
  if(/^en_eq/.test(pgId))return 'EnEQ2';
  if(/^en_business/.test(pgId))return 'EnBR';
  // 連結FS（consolidated: BS=0, PL=1, EQ=2, CF=3）
  if(/^consolidated_0$/.test(pgId))return 'CBS';
  if(/^consolidated_1$/.test(pgId))return 'CPL';
  if(/^consolidated_2$/.test(pgId))return 'CEQ';
  if(/^consolidated_3$/.test(pgId))return 'CCF';
  // 単体FS（standalone: BS=0, PL=1, EQ=2）
  if(/^standalone_0$|^standalone$/.test(pgId))return 'BS';
  if(/^standalone_1$/.test(pgId))return 'PL';
  if(/^standalone_2$/.test(pgId))return 'EQ';
  if(/^cf_standalone/.test(pgId))return 'CF';
  // EQ
  if(/ceq/.test(pgId))return 'CEQ';
  if(/eq/.test(pgId))return 'EQ';
  // 事業報告書（(1)と(2)以降を分離）
  if(/^business_1$|^business_hp$/.test(pgId))return 'BR1';
  if(/^business_2$/.test(pgId))return 'BR2';
  if(/business/.test(pgId))return 'BR1';
  // レビュー報告書
  if(/review_report/.test(pgId))return 'Review';
  // 監査役報告書
  if(/audit_report/.test(pgId))return 'Audit';
  if(/summary/.test(pgId))return 'BR1';
  // 注記
  if(/consol_notes|cnote/.test(pgId))return 'CNote';
  if(/^notes/.test(pgId))return 'Note';
  // 追加書類: pgIdをそのままキーとして使用
  return pgId;
}

function renderContent(){
  // v12.8: 書式設定のCSS変数を適用
  applyStyleVars();
  const el=document.getElementById('content');
  if(MODE==='preview'){
    el.className='pv';
    // Collect pages with section tracking
    const pvmap=getPVMap();
    const docOrder=curP().docOrder;
    // Render each section and tag pages with data-pg-id
    let allPagesHtml='';
    docOrder.forEach(secId=>{
      const fn=pvmap[secId];
      if(!fn)return;
      let secHtml='';
      try{secHtml=fn();}catch(e){console.error(`Section ${secId} render error:`,e);secHtml=`<div class="doc-page" style="color:red;padding:40px">⚠ ${secId} の描画エラー: ${e.message}</div>`;}
      if(!secHtml||!secHtml.trim())return; // 空セクションはスキップ
      // Inject data-pg-id into each doc-page div in this section
      const tmp2=document.createElement('div');
      tmp2.innerHTML=secHtml;
      const secPages=[...tmp2.querySelectorAll('.doc-page,.doc-page-compact,.doc-page-flow,.doc-page-landscape')];
      secPages.forEach((p,si)=>{
        // レンダリング関数が既にdata-pg-idを設定していればそれを使う
        const pgId=p.getAttribute('data-pg-id')||(secPages.length>1?`${secId}_${si}`:secId);
        p.setAttribute('data-pg-id',pgId);
        // Apply saved page style
        _applyPageStyle(p,pgId);
      });
      allPagesHtml+=tmp2.innerHTML;
    });

    const tmp=document.createElement('div');
    tmp.innerHTML=allPagesHtml;
    const rawPages=[...tmp.querySelectorAll('.doc-page,.doc-page-compact,.doc-page-flow,.doc-page-landscape')];
    // 完全空白ページを除去（タイトルもコンテンツもないページ）
    const pages=rawPages.filter(p=>{
      // テキスト内容があればOK
      if(p.textContent.trim())return true;
      // 画像やテーブルがあればOK
      if(p.querySelector('img,table,svg'))return true;
      return false;
    });
    const total=pages.length;

    // Build A4 frames
    const framesHtml=pages.map((p,i)=>{
      const isFlow=p.classList.contains('doc-page-flow');
      const isLandscape=p.classList.contains('doc-page-landscape');
      const pgId=p.getAttribute('data-pg-id')||`page_${i}`;
      const sizeLabel=isLandscape?'A4横 (297×210mm)':'A4縦 (210×297mm)';
      const secLabel=pgId.replace(/_\d+$/,'');
      const frameClass=`a4-frame${isFlow?' a4-flow':''}${isLandscape?' a4-landscape':''}`;
      return `
      <div class="${frameClass}" id="af-${i}" data-idx="${i}">
        <div class="a4-pg-size">${sizeLabel}</div>
        <div class="a4-pg-num">P.${i+1} / ${total} <span style="font-size:8px;color:#aaa">[${secLabel}]</span></div>
        ${p.outerHTML}
      </div>`;
    }).join('');

    el.innerHTML=`
      <div class="pv-bar">
        <span class="pv-info">📄 プレビュー</span>
        <div class="pv-sep"></div>

        <button class="pvb pvb-gold" onclick="generateBooklet('a4')">📖 冊子 A4横（A5縦×2）</button>
        <button class="pvb pvb-gold" onclick="generateBooklet('b5')" style="background:#9b7cb6;color:#fff">📖 冊子 B5横（B6縦×2）</button>
        <div class="pv-sep"></div>
        <button class="pvb pvb-blue" onclick="window.print()">🖨 印刷 / PDF保存</button>
      </div>
      <div style="padding:28px 0" id="pv-pages">${framesHtml}</div>`;

    // After DOM update, paginate flow pages into A4 units
    // fonts.ready を待ち、2フレーム後に実行（フォント読み込み完了後のレイアウト確定を保証）
    const _doPaginate=()=>{
      try{
        _paginateFlowPages();
      }catch(e){
        console.error('Pagination error:',e);
        // ページ分割エラー時: フロー全表示（切れるより見える方がまし）
        document.querySelectorAll('.a4-frame.a4-flow').forEach(f=>{
          f.style.height='auto';f.style.overflow='visible';
        });
        const banner=document.createElement('div');

async function extraDocImport(ptypeId,idx){
  const inp=document.createElement('input');
  inp.type='file';
  inp.accept='.docx,.xlsx,.xls,.pdf,.png,.jpg,.jpeg,.txt,.csv';
  inp.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    const doc=S.purposes[ptypeId].extraDocs[idx];
    const ext=file.name.split('.').pop().toLowerCase();
    if(ext==='docx'){
      const buf=await file.arrayBuffer();
      const text=await extractDocxText(buf);
      doc.type='word';doc.textContent=text||'';doc.dataUrl='';
    } else if(ext==='xlsx'||ext==='xls'){
      doc.dataUrl=await readAsDataURL(file);
      doc.type='excel';doc.textContent='';doc.mimeType=file.type||'application/vnd.ms-excel';
    } else if(file.type==='application/pdf'){
      doc.dataUrl=await readAsDataURL(file);
      doc.type='pdf';doc.textContent='';
    } else if(file.type.startsWith('image/')){
      doc.dataUrl=await readAsDataURL(file);
      doc.type='image';doc.textContent='';
    } else {
      doc.textContent=await new Promise(res=>{const r=new FileReader();r.onload=ev=>res(ev.target.result);r.readAsText(file);});
      doc.type='text';doc.dataUrl='';
    }
    doc.name=file.name;
    showToast(`✅ ${file.name} をインポートしました`);
    renderContent();
  };
  inp.click();
}

function readAsDataURL(file){
  return new Promise(res=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.readAsDataURL(file);});
}


async function unzipOfficeXml(buf){
  const bytes=buf instanceof Uint8Array?buf:new Uint8Array(buf);
  const out={};
  let i=0;
  while(i<=bytes.length-30){
    if(bytes[i]!==0x50||bytes[i+1]!==0x4B||bytes[i+2]!==0x03||bytes[i+3]!==0x04){i++;continue;}
    const flags=bytes[i+6]|(bytes[i+7]<<8);
    const method=bytes[i+8]|(bytes[i+9]<<8);
    const compSize=bytes[i+18]|(bytes[i+19]<<8)|(bytes[i+20]<<16)|(bytes[i+21]<<24);
    const uncompSize=bytes[i+22]|(bytes[i+23]<<8)|(bytes[i+24]<<16)|(bytes[i+25]<<24);
    const fnLen=bytes[i+26]|(bytes[i+27]<<8);
    const extraLen=bytes[i+28]|(bytes[i+29]<<8);
    if(flags & 0x08) throw new Error('未対応のZIP形式です（data descriptor）');
    const nameBytes=bytes.slice(i+30,i+30+fnLen);
    const name=new TextDecoder().decode(nameBytes);
    const dataStart=i+30+fnLen+extraLen;
    const compData=bytes.slice(dataStart,dataStart+compSize);
    let data;
    if(method===0){
      data=compData;
    }else if(method===8){
      if(typeof DecompressionStream==='undefined') throw new Error('このブラウザはExcel圧縮解凍に非対応です');
      const ds=new DecompressionStream('deflate-raw');
      const stream=new Blob([compData]).stream().pipeThrough(ds);
      data=new Uint8Array(await new Response(stream).arrayBuffer());
      if(uncompSize && data.length!==uncompSize){ /* ignore minor mismatch */ }
    }else{
      throw new Error('未対応の圧縮方式です: '+method);
    }
    out[name]=data;
    i=dataStart+compSize;
  }
  return out;
}

async function saveAs(){
  _serializeSForSave(); // 保存前にSの現在値をHTML内に埋め込む
  const html=document.documentElement.outerHTML;
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  // showSaveFilePicker API (Chrome/Edge 対応)
  if(window.showSaveFilePicker){
    try{

        suggestedName:`${S.co.name}_${S.co.period}_disclosure.html`,
        types:[{description:'HTML ファイル',accept:{'text/html':['.html']}}],
      });
      const w=await fh.createWritable();
      await w.write(blob);
      await w.close();
      showToast('✅ 保存しました');
    }catch(e){if(e.name!=='AbortError')showToast('❌ 保存に失敗: '+e.message);}
  } else {
    // フォールバック: 通常ダウンロード
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`${S.co.name}_${S.co.period}_disclosure.html`;
    a.click();URL.revokeObjectURL(a.href);
    showToast('✅ ダウンロードしました（ブラウザがSave As APIに非対応のためダウンロードで代替）');
  }
}

// ══════════════════════════════════════════════
//  年度繰越処理（年次更新）
// ══════════════════════════════════════════════
function rolloverYear(){
  if(LOCKED){showToast('❌ データがクローズされています');return;}
  if(!confirm('【確認】現在の当期データを前期データとして保存し、翌年度へ繰り越します。\n\nこの操作は取り消せません。\n事前にExcelエクスポートでバックアップを取ることを推奨します。\n\n実行してよろしいですか？'))return;

  // 0. prev_bs/prev_cbs → prev2（前々期BS要約をスライド）
  const prevCbsCalc=Object.keys(S.prev_cbs||{}).length?calcBS(S.prev_cbs,'prev_cbs'):{bsNA:0,bsTA:0};
  const prevBsCalc=Object.keys(S.prev_bs||{}).length?calcBS(S.prev_bs,'prev_bs'):{bsNA:0,bsTA:0};
  S.prev2={
    cbsNA:String(prevCbsCalc.bsNA||0), cbsTA:String(prevCbsCalc.bsTA||0),
    bsNA:String(prevBsCalc.bsNA||0), bsTA:String(prevBsCalc.bsTA||0)
  };

  // 1. 当期→prev_*にディープコピー
  S.prev_cbs=JSON.parse(JSON.stringify(S.cbs));
  S.prev_cpl=JSON.parse(JSON.stringify(S.cpl));
  S.prev_ccf=JSON.parse(JSON.stringify(S.ccf));
  S.prev_bs=JSON.parse(JSON.stringify(S.bs));
  S.prev_pl=JSON.parse(JSON.stringify(S.pl));
  S.prev_cf=JSON.parse(JSON.stringify(S.cf||{}));

  // 2. EQ/CEQ: closing全キー→新data.openingにコピー
  ['ceq','eq'].forEach(stKey=>{
    const st=S[stKey];
    if(!st)return;
    const eqDef=ensureEqDef(stKey);
    const m=calcEqMatrix(eqDef);
    const rPre=(stKey==='ceq')?'ceq_r_':'eq_r_';
    const closingKey=rPre+'closing';
    const openingKey=rPre+'opening';
    const closing=m[closingKey];
    if(!closing)return;
    // 前期EQを保存
    S['prev_'+stKey]=JSON.parse(JSON.stringify(st));
    // closing→新openingに全キーコピー
    const newOpening={};
    Object.keys(closing).forEach(k=>{
      newOpening[k]=String(closing[k]||0);
    });
    st.data={[openingKey]:newOpening};
  });

  // 3. 当期の数値データをクリア
  const clearFS=(obj)=>{
    if(!obj)return;
    Object.keys(obj).forEach(k=>{
      if(k==='eqDef'||k==='data')return; // data(EQ)は上で処理済み
      if(typeof obj[k]==='object')return; // ネストオブジェクトは保持
      obj[k]='';
    });
  };
  clearFS(S.cbs);clearFS(S.cpl);clearFS(S.ccf);
  clearFS(S.bs);clearFS(S.pl);clearFS(S.cf);

  // 5. 会社情報の期数+1、日付の年+1
  const periodMatch=S.co.period.match(/(\d+)/);
  if(periodMatch){
    const newNum=parseInt(periodMatch[1])+1;
    S.co.period=S.co.period.replace(periodMatch[1],String(newNum));
  }
  const advanceYear=(dateStr)=>{
    const m=dateStr.match(/(\d{4})/);
    if(m)return dateStr.replace(m[1],String(parseInt(m[1])+1));
    return dateStr;
  };
  S.co.prevShares=S.co.shares||'';
  S.co.prevEmployees=S.co.employees||'';
  S.co.employees='';
  S.co.prevConsEmployees=S.co.consEmployees||'';
  S.co.consEmployees='';
  S.co.from=advanceYear(S.co.from);
  S.co.to=advanceYear(S.co.to);
  S.co.preparedDate=advanceYear(S.co.preparedDate);

  showToast('✅ 年度繰越完了！ '+S.co.period+' に更新しました');
  render();
}

// 冊子機能と同様に、印刷専用の別ウィンドウを生成して確実に出力する仕組みに変更
// ══════════════════════════════════════════════
//  共通スケール計算（プレビュー・PDF出力で共用）
// ══════════════════════════════════════════════
function _padBsRows(assetRowArr, liabRowArr, blankRow){
  const diff=assetRowArr.length-liabRowArr.length;
  if(diff>0){
    // liab側が短い→最終行の前にblank挿入
    const last=liabRowArr.pop();
    for(let i=0;i<diff;i++)liabRowArr.push(blankRow);
    if(last)liabRowArr.push(last);
  } else if(diff<0){
    const last=assetRowArr.pop();
    for(let i=0;i<-diff;i++)assetRowArr.push(blankRow);
    if(last)assetRowArr.push(last);
  }
}


// ══════════════════════════════════════════════
//  A4 PREVIEW HELPERS
// ══════════════════════════════════════════════
const A4W=794,A4H=1123;
// フローページをA4単位に分割（テキスト開始位置を実測し、行グリッドに合わせて分割）
function _paginateFlowPages(){
  const pvPages=document.getElementById('pv-pages');
  if(!pvPages)return;
  const flowFrames=[...pvPages.querySelectorAll('.a4-frame.a4-flow')];
  flowFrames.forEach(frame=>{
    const page=frame.querySelector('.doc-page-flow');
    if(!page)return;

    const origOF=page.style.overflow;
    page.style.overflow='visible';
    // ★重要: 親フレームのoverflowも一時解除しないと、1123px以降の
    // テキスト行位置がgetClientRectsで取得できない
    const origFrameOF=frame.style.overflow;
    const origFrameH=frame.style.height;
    frame.style.overflow='visible';
    frame.style.height='auto';
    const totalH=page.scrollHeight;
    if(totalH<=A4H){page.style.overflow=origOF;frame.style.overflow=origFrameOF;frame.style.height=origFrameH;return;}

    const cs=getComputedStyle(page);
    const padV=parseFloat(cs.paddingTop)||48;
    const pageRect=page.getBoundingClientRect();
    const pageTop=pageRect.top;

    // ── 全ブロック要素の実測位置を再帰収集 ──
    const breakCandidates=[];
    // テキストノードから実際の行位置を取得するヘルパー
    const _getTextLinePositions=(el)=>{
      const positions=[];
      const walker=document.createTreeWalker(el,NodeFilter.SHOW_TEXT);
      let tn;
      while(tn=walker.nextNode()){
        if(!tn.textContent.trim()) continue;
        try{
          const range=document.createRange();
          range.selectNode(tn);
          const rects=range.getClientRects();
          for(const r of rects){
            positions.push(r.top-pageTop);
          }
        }catch(e){}
      }
      // 重複除去（同一行を1つに）
      positions.sort((a,b)=>a-b);
      const unique=[];
      let prev=-100;
      for(const y of positions){
        if(y-prev>3){unique.push(y);prev=y;}
      }
      return unique;
    };

    const _collectBreaks=(el)=>{
      const rect=el.getBoundingClientRect();
      const elTop=rect.top-pageTop;
      const elBot=rect.bottom-pageTop;
      const elH=elBot-elTop;
      breakCandidates.push({y:elTop});
      if(elH<=80) return;
      const blockChildren=[...el.children].filter(c=>{
        const d=getComputedStyle(c).display;
        return d==='block'||d==='flex'||d==='grid'||d==='table'||d==='list-item';
      });
      if(blockChildren.length>0){
        blockChildren.forEach(c=>_collectBreaks(c));
      } else if(elH>60){
        // リーフテキスト要素 → テキストノードから行位置を実測
        const linePositions=_getTextLinePositions(el);
        if(linePositions.length>1){
          // 各行の先頭位置を候補に（行の先頭で切ればその行は次ページに完全表示）
          for(const y of linePositions){
            breakCandidates.push({y:Math.floor(y)});
          }
        } else {
          // フォールバック: lineHeight計算（行間の中央で切る安全方式）
          const elCS=getComputedStyle(el);
          const elLH=parseFloat(elCS.lineHeight);
          const elFS=parseFloat(elCS.fontSize)||14;
          if(elLH&&elLH>8){
            // 行間ギャップ = lineH - fontSize。その中央で分割すれば文字に触れない
            const gapHalf=Math.max((elLH-elFS)/2, 2);
            const nLines=Math.floor(elH/elLH);
            for(let n=1;n<=nLines;n++){
              const lineY=elTop+n*elLH;
              // 行の先頭からgapHalf分だけ上 = 前行の下端と当行の上端の中間
              const safeY=lineY-gapHalf;
              if(safeY>elTop+5 && safeY<elBot-5){
                breakCandidates.push({y:Math.floor(safeY)});
              }
            }
          }
        }
      }
    };
    for(let i=0;i<page.children.length;i++){
      _collectBreaks(page.children[i]);
    }
    // ソートして重複除去
    breakCandidates.sort((a,b)=>a.y-b.y);
    const candidates=[];
    let lastY=-1;
    for(const c of breakCandidates){
      if(c.y-lastY>1){candidates.push(c.y);lastY=c.y;}
    }
    page.style.overflow=origOF;
    frame.style.overflow=origFrameOF;
    frame.style.height=origFrameH;


    // ── 分割位置を決定 ──
    // ページ1: 0 ～ A4H の範囲に収まる最後の候補
    // ページN: 前ページ末尾 ～ +contentH の範囲に収まる最後の候補
    const contentHPage2=A4H-padV*2; // 2ページ目以降の使用可能高さ
    const breaks=[0]; // 各ページの開始Y座標
    let cursor=0; // 現在のページ開始位置
    let pageIdx=0;

    while(cursor<totalH-10){
      const availH=(pageIdx===0)?A4H:contentHPage2;
      const pageEnd=cursor+availH;
      if(pageEnd>=totalH-5) break; // 残りが収まる

      // pageEnd以下の最大候補を探す（2ページ目以降はpadV分のオフセット考慮）
      let bestBreak=-1;
      for(let ci=0;ci<candidates.length;ci++){
        const cy=candidates[ci];
        if(cy<=cursor+2) continue; // 現在のページ開始以下はスキップ
        if(cy<=pageEnd) bestBreak=cy;
        else break;
      }
      if(bestBreak<=cursor+2){
        // 適切な分割候補がない場合、強制的にavailHで分割
        bestBreak=pageEnd;
      }
      breaks.push(bestBreak);
      cursor=bestBreak;
      pageIdx++;
    }


    // ── ページフレーム生成 ──
    const pageOuterHtml=page.outerHTML;
    const frag=document.createDocumentFragment();

    for(let pg=0;pg<breaks.length;pg++){
      const offsetY=breaks[pg];
      const nextBreak=pg<breaks.length-1?breaks[pg+1]:totalH;
      const clipH=nextBreak-offsetY;
      const newFrame=document.createElement('div');
      newFrame.className='a4-frame';
      if(pg===0){
        newFrame.innerHTML=`<div style="height:${clipH}px;overflow:hidden;background:white">${pageOuterHtml}</div>`;
      } else {
        const visH=Math.min(clipH,A4H-padV);
        newFrame.innerHTML=`<div style="height:${padV}px;background:white"></div><div style="height:${visH}px;overflow:hidden;background:white"><div style="margin-top:-${offsetY}px">${pageOuterHtml}</div></div>`;
      }
      frag.appendChild(newFrame);
    }
    frame.replaceWith(frag);
  });

  const allFrames=[...pvPages.querySelectorAll('.a4-frame')];
  const total=allFrames.length;
  allFrames.forEach((f,i)=>{
    let pgNum=f.querySelector('.a4-pg-num');
    if(!pgNum){pgNum=document.createElement('div');pgNum.className='a4-pg-num';f.appendChild(pgNum);}
    pgNum.textContent=`P.${i+1} / ${total}`;
    if(!f.querySelector('.a4-pg-size')){
      const sz=document.createElement('div');sz.className='a4-pg-size';sz.textContent='A4縦 (210×297mm)';f.appendChild(sz);
    }
  });
  const info=document.querySelector('.pv-info');
  if(info) info.textContent=`📄 全${total}ページ`;
}

function checkA4Overflow(){
  const pvPages=document.getElementById('pv-pages');
  if(!pvPages)return;
  // ページ番号の総数を更新
  const allFrames=[...pvPages.querySelectorAll('.a4-frame')];
  const total=allFrames.length;
  const info=document.querySelector('.pv-info');
  if(info) info.textContent=`📄 全${total}ページ`;
}

//  BOOKLET GENERATOR（中綴じ / 騎馬製本）
// ══════════════════════════════════════════════
function generateBooklet(fmt='a4'){
  const pgMargin=19;
  const FORMATS={
    a4:{label:'A4横（A5縦×2）',paperSize:'A4 landscape',
      panelW:Math.floor((1123-pgMargin*2)/2), panelH:794-pgMargin*2,
      pageLabel:'A4横/A5縦'},
    b5:{label:'B5横（B6縦×2）',paperSize:'B5 landscape',
      panelW:Math.floor((972-pgMargin*2)/2), panelH:689-pgMargin*2,
      pageLabel:'B5横/B6縦'},
  };
  const F=FORMATS[fmt]||FORMATS.a4;
  const {panelW,panelH,label,paperSize,pageLabel}=F;
  // A4ページをパネルに収まるよう縮小（余白はA4側で制御済み）
  const scale=Math.min(panelW/A4W, panelH/A4H);
  const sideGap=Math.round((panelW-A4W*scale)/2); // 水平中央配置用
  const spreadW=panelW*2, spreadH=panelH;
  const scStr=scale.toFixed(5);
  const pct=Math.round(scale*1000)/10;

  // ── プレビューのA4フレームからページHTMLを取得 ──
  const pvPages=document.getElementById('pv-pages');
  if(!pvPages){showToast('❌ プレビュー画面を先に表示してください');return;}
  const frames=[...pvPages.querySelectorAll('.a4-frame')];
  if(!frames.length){showToast('❌ ページが見つかりません');return;}

  const win=window.open('','_blank');
  if(!win){showToast('❌ ポップアップがブロックされています');return;}

  // 各フレーム内のページコンテンツを取得（ラベル等を除外）
  const pageHtmls=frames.map(f=>{
    const clone=f.cloneNode(true);
    // プレビュー用ラベルを除去
    clone.querySelectorAll('.a4-pg-size,.a4-pg-num').forEach(el=>el.remove());
    return clone.innerHTML;
  }).filter(html=>{
    // 完全空白ページを除去
    const tmp=document.createElement('div');
    tmp.innerHTML=html;
    return !!(tmp.textContent.trim()||tmp.querySelector('img,table,svg'));
  });

  const n=pageHtmls.length;
  const total=Math.max(4,Math.ceil(n/4)*4);
  while(pageHtmls.length<total) pageHtmls.push('');

  const numSheets=total/4;
  const spreads=[];
  for(let s=1;s<=numSheets;s++){
    spreads.push({lp:total-2*s+2,rp:2*s-1,sheet:s,side:'表面'});
    spreads.push({lp:2*s,rp:total-2*s+1,sheet:s,side:'裏面'});
  }

  const mkPanel=(pageIdx,side)=>{
    const html=pageHtmls[pageIdx];
    const bOff=parseInt((S.style||{}).bookletOffset||'0')||0;
    // 右パネルのみオフセット適用（右パネルが中央に寄る問題を補正）
    const adj=side==='right'?bOff:0;
    const ml=`margin-left:${sideGap+adj}px;`;
    if(!html) return `<div class="panel"><div class="a4-frame" style="width:${A4W}px;height:${A4H}px;transform:scale(${scStr});transform-origin:top left;${ml}background:white;margin:0"></div></div>`;
    return `<div class="panel"><div class="a4-frame" style="width:${A4W}px;height:${A4H}px;transform:scale(${scStr});transform-origin:top left;${ml}background:white;overflow:hidden;margin:0">${html}</div></div>`;
  };

  const spreadsHtml=spreads.map(({lp,rp,sheet,side},i)=>`
<div class="spread">
  ${mkPanel(lp-1,'left')}<div class="fold-line"></div>${mkPanel(rp-1,'right')}
  <div class="pn-l">${lp}</div><div class="pn-r">${rp}</div>
  <div class="spread-info">第${sheet}折 ${side}（面${i+1}/${spreads.length}）</div>
</div>`).join('');

  const bCSS=`${getStyleVarsCSS()}
*{box-sizing:border-box;margin:0;padding:0}

.print-btn{padding:6px 16px;background:#c9a84c;color:#1a2744;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:700}

.spread{width:${spreadW}px;height:${spreadH}px;display:flex;align-items:stretch;background:white;margin:0 auto 16px;box-shadow:0 2px 14px rgba(0,0,0,.55);position:relative;overflow:hidden;page-break-after:always}
.panel{width:${panelW}px;height:${panelH}px;overflow:hidden;position:relative;flex-shrink:0;background:white}

  .panel{width:${panelW}px!important;height:${panelH}px!important;overflow:hidden!important}
  .inner-wrap{width:${panelW}px!important;height:${panelH}px!important;overflow:hidden!important}
  @page{size:${paperSize};margin:5mm}
}`;

  // メインページのCSSを取得（フォント等を完全に一致させる）
  const mainCSS=document.querySelector('style').textContent;

  win.document.write(`<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8">
<title>冊子[${label}] — ${esc(S.co.name)} ${esc(S.co.period)}</title>
<style>${mainCSS}</style>
<style>${bCSS}</style>
</head>
<body>
<div class="header-bar">
  <h1>📖 中綴じ冊子 [${label}]　${esc(S.co.name)}　${esc(S.co.period)} ／ 全${total}P（${numSheets}折×4=${spreads.length}印刷面）　縮小率${pct}%（A4縦→${pageLabel}）</h1>
  <button class="print-btn" onclick="window.print()">🖨 印刷（${label.split('（')[0]}・両面）</button>
</div>
<div class="guide">
  【印刷設定】 用紙 ${label.split('（')[0]}　両面印刷　短辺とじ（フリップ）<br>
  【製本手順】 ① 全${spreads.length}面を両面印刷 → ② 印刷物を順に重ねる → ③ 中央を二つ折り → ④ ホッチキスで中綴じ<br>
  【面付け】 左P番号 ｜ 右P番号（折り目中心）　P.1（表紙）= 第1折表面の右　P.${total}（裏表紙）= 第1折表面の左
</div>
${spreadsHtml}
</body></html>`);
  win.document.close();
  showToast(`✅ ${label} 冊子完了 ${total}P / ${numSheets}折 / ${spreads.length}面`);
}

    el=document.createElement('script');
    el.id='saved-data';
    el.type='application/json';

  try{
    const saved=JSON.parse(el.textContent);
    Object.keys(saved).forEach(k=>{S[k]=saved[k];});
  }catch(e){console.error('saved-data parse error:',e);}
}
